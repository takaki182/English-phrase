<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ORIGINAL">
  <meta name="theme-color" content="#6366f1">
  <title>ORIGINAL</title>
  <link rel="manifest" href="manifest.json">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Segoe UI', sans-serif;
      background: #f0e8d8; color: #0a0a0a;
    }

    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px 20px;
      padding-top: max(env(safe-area-inset-top, 0px), 24px);
      padding-bottom: max(env(safe-area-inset-bottom, 0px), 24px);
    }
    .screen.hidden { display: none; }

    /* ── Home ── */
    .home-logo  { font-size: 36px; margin-bottom: 16px; }
    .home-title {
      font-size: 34px; font-weight: 900; letter-spacing: -1.5px;
      margin-bottom: 6px; color: #0a0a0a;
    }
    .home-sub   { font-size: 14px; color: #6b6457; margin-bottom: 44px; letter-spacing: .2px; }

    .deck-grid { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 10px; }
    .deck-card {
      width: 100%; padding: 20px 20px; border: none; border-radius: 14px;
      cursor: pointer; text-align: left; display: flex; align-items: center; gap: 14px;
      transition: transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .deck-card:active { transform: scale(.97); }
    .deck-card.indigo { background: #1844c8; color: white; }
    .deck-card.orange { background: #d93d1c; color: white; }
    .deck-card.rose   { background: #c0930a; color: white; }
    .deck-card.teal   { background: #0a8f7a; color: white; }
    .deck-card.violet { background: #6409c4; color: white; }
    .deck-icon { font-size: 26px; flex-shrink: 0; }
    .deck-info { flex: 1; }
    .deck-name  { font-size: 16px; font-weight: 800; margin-bottom: 2px; letter-spacing: -.2px; }
    .deck-count { font-size: 12px; opacity: .7; }

    /* ── Study ── */
    .study-inner {
      width: 100%; max-width: 420px;
      display: flex; flex-direction: column; align-items: center;
    }
    .top-bar {
      width: 100%; display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 18px;
    }
    .icon-btn {
      background: none; border: none; font-size: 22px;
      cursor: pointer; padding: 6px; line-height: 1;
      -webkit-tap-highlight-color: transparent; color: #0a0a0a;
    }
    .count-pill {
      font-size: 12px; font-weight: 700; color: #6b6457;
      background: rgba(0,0,0,.07); padding: 5px 14px; border-radius: 99px;
      letter-spacing: .3px;
    }
    .progress-track {
      width: 100%; height: 4px; background: rgba(0,0,0,.12);
      border-radius: 2px; margin-bottom: 22px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 2px;
      transition: width .4s cubic-bezier(.4,0,.2,1);
    }
    .fill-indigo { background: #1844c8; }
    .fill-orange { background: #d93d1c; }
    .fill-rose   { background: #c0930a; }
    .fill-teal   { background: #0a8f7a; }
    .fill-violet { background: #6409c4; }

    /* Stage dots */
    .stage-dots { display: flex; gap: 6px; margin-bottom: 20px; min-height: 19px; }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(0,0,0,.15); transition: background .2s;
    }
    .dot.active-indigo { background: #1844c8; }
    .dot.active-orange { background: #d93d1c; }
    .dot.active-rose   { background: #c0930a; }
    .dot.active-teal   { background: #0a8f7a; }
    .dot.active-violet { background: #6409c4; }

    /* Card */
    .card-area { width: 100%; position: relative; margin-bottom: 22px; }
    .card {
      width: 100%; min-height: 250px; background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 4px 32px rgba(0,0,0,.10);
      padding: 32px 28px; cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: pan-y; will-change: transform; user-select: none;
    }
    .card.no-transition { transition: none !important; }

    @keyframes flyRight { to { transform: translateX(130%) rotate(15deg); opacity: 0; } }
    @keyframes flyLeft  { to { transform: translateX(-130%) rotate(-15deg); opacity: 0; } }
    @keyframes popIn    { from { transform: scale(.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .card.fly-right { animation: flyRight .28s ease-in forwards; }
    .card.fly-left  { animation: flyLeft  .28s ease-in forwards; }
    .card.pop-in    { animation: popIn .22s ease-out; }

    .card-label {
      font-size: 10px; font-weight: 800; letter-spacing: 1.5px;
      text-transform: uppercase; margin-bottom: 12px;
    }
    .label-indigo { color: #1844c8; }
    .label-orange { color: #d93d1c; }
    .label-rose   { color: #c0930a; }
    .label-teal   { color: #0a8f7a; }
    .label-violet { color: #6409c4; }

    .card-situation { font-size: clamp(14px, 3.8vw, 17px); color: #5a5040; line-height: 1.7; }
    .card-phrase    { font-size: clamp(18px, 4.5vw, 23px); font-weight: 900; line-height: 1.4; color: #0a0a0a; letter-spacing: -.3px; }
    .card-meaning   { font-size: 14px; color: #6b6457; line-height: 1.7; }
    .card-divider   { width: 28px; height: 2px; background: #e8dece; border-radius: 1px; margin: 14px auto; }
    .card-tap-hint  { font-size: 11px; color: #b8ac9c; margin-top: 20px; letter-spacing: .5px; }
    .card-example   { font-size: 13px; color: #8a7e6e; line-height: 1.65; margin-top: 10px; font-style: italic; }

    /* Speak button */
    .speak-btn {
      display: none; width: 100%; padding: 11px; border: none;
      background: rgba(0,0,0,.06); border-radius: 10px;
      font-size: 14px; font-weight: 700; color: #5a4a38;
      cursor: pointer; letter-spacing: .3px;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s, transform .1s;
      margin-bottom: 10px;
    }
    .speak-btn:active { transform: scale(.97); background: rgba(0,0,0,.1); }
    .speak-btn.speaking { background: #e8dece; color: #2a1a00; }

    /* Swipe labels */
    .swipe-label {
      position: absolute; top: 50%; transform: translateY(-50%);
      font-size: 11px; font-weight: 900; letter-spacing: 1.2px;
      padding: 6px 14px; border-radius: 6px;
      opacity: 0; pointer-events: none; border: 2px solid;
      text-transform: uppercase;
    }
    .swipe-label.got   { right: 10px; color: #0a7c40; background: #d4f5e0; border-color: #0a7c40; }
    .swipe-label.again { left: 10px;  color: #c01818; background: #fde8e8; border-color: #c01818; }

    /* Buttons */
    .action-btns { width: 100%; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .action-btn {
      padding: 15px 8px; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      -webkit-tap-highlight-color: transparent; transition: transform .1s;
    }
    .action-btn:active { transform: scale(.96); }
    .btn-again { background: #0a0a0a; color: #ffffff; }
    .btn-got   { background: #1844c8; color: #ffffff; }
    .btn-save  { background: #e8dece; color: #5a4a28; }
    .btn-save.saved { background: #f5d978; color: #3a2a00; }
    .btn-icon  { font-size: 18px; }
    .btn-text  { font-size: 11px; font-weight: 800; letter-spacing: .4px; }

    /* ANKI Rating Buttons */
    .anki-wrap { width: 100%; display: flex; flex-direction: column; gap: 8px; }
    .anki-wrap.hidden { display: none; }
    .anki-row  { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .anki-btn  {
      padding: 12px 4px; border: none; border-radius: 12px;
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; gap: 3px;
      -webkit-tap-highlight-color: transparent; transition: transform .1s;
    }
    .anki-btn:active { transform: scale(.95); }
    .anki-label { font-size: 12px; font-weight: 800; letter-spacing: .3px; }
    .anki-int   { font-size: 11px; font-weight: 700; opacity: .65; }
    .anki-again { background: #fce8e8; color: #c0392b; }
    .anki-hard  { background: #fef0dc; color: #c87d10; }
    .anki-good  { background: #e8f8f0; color: #1e8449; }
    .anki-easy  { background: #e8f4fb; color: #2874a6; }

    /* ── Complete ── */
    .complete-emoji { font-size: 64px; margin-bottom: 16px; }
    .complete-title { font-size: 30px; font-weight: 900; margin-bottom: 8px; letter-spacing: -1px; color: #0a0a0a; }
    .complete-desc  { color: #6b6457; font-size: 14px; margin-bottom: 36px; text-align: center; }
    .stats-row { display: flex; gap: 14px; margin-bottom: 36px; }
    .stat-box {
      text-align: center; background: white; border-radius: 14px;
      padding: 16px 28px; box-shadow: 0 2px 16px rgba(0,0,0,.07);
    }
    .stat-num   { font-size: 32px; font-weight: 900; color: #1844c8; letter-spacing: -1px; }
    .stat-label { font-size: 11px; color: #9a8e80; margin-top: 2px; letter-spacing: .5px; text-transform: uppercase; font-weight: 700; }
    .complete-actions { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 10px; }
    .btn-block {
      width: 100%; padding: 16px; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 800; cursor: pointer; letter-spacing: -.1px;
      -webkit-tap-highlight-color: transparent; transition: transform .1s;
    }
    .btn-block:active { transform: scale(.97); }
    .btn-primary   { background: #0a0a0a; color: white; }
    .btn-secondary { background: #e8dece; color: #3a3028; }

    /* ── Menu ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(10,10,10,.5);
      display: flex; align-items: flex-end; justify-content: center;
      padding: 20px; z-index: 100;
    }
    .overlay.hidden { display: none; }
    .menu-sheet { background: #f0e8d8; border-radius: 18px; padding: 20px; width: 100%; max-width: 420px; }
    .menu-title {
      font-size: 10px; font-weight: 800; color: #9a8e80;
      margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px;
    }
    .menu-item {
      width: 100%; padding: 14px 16px; border: none; border-radius: 10px;
      background: #ffffff; font-size: 15px; font-weight: 700; color: #0a0a0a;
      cursor: pointer; text-align: left; margin-bottom: 8px;
      -webkit-tap-highlight-color: transparent;
    }
    .menu-cancel {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      background: #e8dece; font-size: 14px; font-weight: 800; color: #6b6457;
      cursor: pointer; margin-top: 8px; -webkit-tap-highlight-color: transparent;
      letter-spacing: .2px;
    }
  </style>
</head>
<body>

<!-- ══ HOME ══ -->
<div class="screen" id="home-screen">
  <div class="home-logo">📖</div>
  <div class="home-title">ORIGINAL</div>
  <div class="home-sub">Choose your deck</div>
  <div class="deck-grid">
    <button class="deck-card indigo" id="deck-takaki">
      <span class="deck-icon">⭐</span>
      <div class="deck-info">
        <div class="deck-name">Takaki Selected</div>
        <div class="deck-count">451 phrases · 3 stages</div>
      </div>
    </button>
    <button class="deck-card orange" id="deck-slang">
      <span class="deck-icon">🔥</span>
      <div class="deck-info">
        <div class="deck-name">Slang &amp; Class</div>
        <div class="deck-count">222 phrases · 2 stages</div>
      </div>
    </button>
    <button class="deck-card rose" id="deck-drama">
      <span class="deck-icon">🎭</span>
      <div class="deck-info">
        <div class="deck-name">Drama English</div>
        <div class="deck-count">26 phrases · 2 stages</div>
      </div>
    </button>
    <button class="deck-card teal" id="deck-judy">
      <span class="deck-icon">🎙️</span>
      <div class="deck-info">
        <div class="deck-name">Judy &amp; Jesse</div>
        <div class="deck-count">10 phrases · 2 stages</div>
      </div>
    </button>
    <button class="deck-card violet" id="deck-adj">
      <span class="deck-icon">✏️</span>
      <div class="deck-info">
        <div class="deck-name">Daily Adjective</div>
        <div class="deck-count">147 words · 3 stages</div>
      </div>
    </button>
  </div>
</div>

<!-- ══ STUDY ══ -->
<div class="screen hidden" id="study-screen">
  <div class="study-inner">
    <div class="top-bar">
      <button class="icon-btn" id="menu-btn">⋯</button>
      <div class="count-pill" id="count-pill">0 / 0</div>
      <button class="icon-btn" id="home-btn">⌂</button>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="stage-dots" id="stage-dots"></div>
    <div class="card-area">
      <div class="card" id="card">
        <div id="card-content"></div>
        <div class="card-tap-hint" id="tap-hint"></div>
      </div>
      <div class="swipe-label got"   id="label-got">GOT IT ✓</div>
      <div class="swipe-label again" id="label-again">AGAIN ✗</div>
    </div>
    <button class="speak-btn" id="speak-btn">🔊 Pronounce</button>
    <!-- Regular deck buttons (Again / Save / Got it) -->
    <div class="action-btns" id="regular-btns">
      <button class="action-btn btn-again" id="btn-again">
        <span class="btn-icon">↩</span><span class="btn-text">Again</span>
      </button>
      <button class="action-btn btn-save" id="btn-save">
        <span class="btn-icon">🔖</span><span class="btn-text">Save</span>
      </button>
      <button class="action-btn btn-got" id="btn-got">
        <span class="btn-icon">✓</span><span class="btn-text">Got it</span>
      </button>
    </div>
    <!-- ANKI rating buttons (shown only when card is fully revealed) -->
    <div class="anki-wrap hidden" id="anki-wrap">
      <div class="anki-row">
        <button class="anki-btn anki-again" id="btn-r0">
          <span class="anki-label">Again</span>
          <span class="anki-int" id="ri-0">&lt;10m</span>
        </button>
        <button class="anki-btn anki-hard" id="btn-r1">
          <span class="anki-label">Hard</span>
          <span class="anki-int" id="ri-1">1d</span>
        </button>
        <button class="anki-btn anki-good" id="btn-r2">
          <span class="anki-label">Good</span>
          <span class="anki-int" id="ri-2">1d</span>
        </button>
        <button class="anki-btn anki-easy" id="btn-r3">
          <span class="anki-label">Easy</span>
          <span class="anki-int" id="ri-3">4d</span>
        </button>
      </div>
      <button class="action-btn btn-save" id="btn-save-anki" style="width:100%">
        <span class="btn-icon">🔖</span><span class="btn-text">Save</span>
      </button>
    </div>
  </div>
</div>

<!-- ══ COMPLETE ══ -->
<div class="screen hidden" id="complete-screen">
  <div class="complete-emoji">🎉</div>
  <div class="complete-title">Session Complete!</div>
  <div class="complete-desc" id="complete-desc"></div>
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label" id="stat-label-total">Total</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="stat-got">0</div>
      <div class="stat-label" id="stat-label-got">Got it</div>
    </div>
  </div>
  <div class="complete-actions">
    <button class="btn-block btn-primary"   id="btn-restart">Study again</button>
    <button class="btn-block btn-secondary" id="btn-back-home">Back to home</button>
  </div>
</div>

<!-- ══ MENU ══ -->
<div class="overlay hidden" id="overlay">
  <div class="menu-sheet">
    <div class="menu-title">Options</div>
    <button class="menu-item" id="menu-shuffle">🔀 Shuffle &amp; restart</button>
    <button class="menu-item" id="menu-saved">🔖 Review saved (<span id="saved-count">0</span>)</button>
    <button class="menu-cancel" id="menu-cancel">Cancel</button>
  </div>
</div>

<script>
'use strict';

const DECKS = {
  takaki: {
    color: 'indigo',
    stages: 3,
    phrases: [{"situation":"When you want to add a brief point to what someone just said","phrase":"A couple of","meaning":"A few, a small number of","example":"I have a couple of things I want to run by you before the meeting."},{"situation":"When validating that something many people experience is real","phrase":"A lot of people… That's a real thing.","meaning":"Used to confirm that something is a common, genuine experience.","example":"A lot of people feel totally burned out after remote work. That's a real thing."},{"situation":"Referring to a single unit of media or content","phrase":"A piece of content","meaning":"One item of media — an article, video, or post.","example":"We need at least one solid piece of content going out every single week."},{"situation":"When crediting a completed creative or professional output","phrase":"A piece of work","meaning":"A finished creative or professional output.","example":"Every piece of work that leaves this agency should make us proud."},{"situation":"Describing a large quantity of something","phrase":"A ton of / a bunch of","meaning":"A large amount of something","example":"We got a ton of responses after the campaign went live."},{"situation":"Shifting from a joke to a sincere point","phrase":"All seriousness / In all seriousness","meaning":"Used to signal you're being genuinely serious now.","example":"Okay, in all seriousness — we need to talk about the budget before this gets out of hand."},{"situation":"Describing something that covers everything from start to finish","phrase":"All the way through","meaning":"Completely, from beginning to end.","example":"I read the entire brief all the way through before I touched the creative."},{"situation":"Referring collectively to several things just mentioned","phrase":"All these things","meaning":"Everything mentioned so far","example":"All these things — the timeline, the budget, the team bandwidth — they all need to align."},{"situation":"Describing what something makes possible","phrase":"Allow us to do","meaning":"Enables or gives us the ability to do something.","example":"This new system will allow us to do things in hours that used to take days."},{"situation":"Introducing a contrasting point after acknowledging something","phrase":"Although","meaning":"Despite the fact that; even though.","example":"Although the numbers look strong, I'm still not fully convinced we're targeting the right audience."},{"situation":"Describing something that has always had a consistent focus","phrase":"Always has been centered","meaning":"Has consistently focused on something.","example":"This brand has always been centered on the idea of making people feel seen."},{"situation":"Referencing a colleague's point to introduce a change","phrase":"And so, like [name] mentioned, we're really doing things a little bit differently this year.","meaning":"Building on a colleague's point to introduce a new direction.","example":"And so, like Megan mentioned, we're really doing things a little bit differently this year — starting with the audience insight."},{"situation":"Casual transition to describe a reaction or next step","phrase":"And then you have to be like","meaning":"Informal way to describe how you or someone responded.","example":"And then you have to be like, okay, cool, let me just take a breath and start over."},{"situation":"Introducing a new, noteworthy point","phrase":"Another interesting thing is that","meaning":"Used to add a new notable point to the conversation.","example":"Another interesting thing is that the youngest cohort is actually the most brand loyal — which is completely counterintuitive."},{"situation":"Asking for practical advice","phrase":"Any tips on…?","meaning":"Asking for suggestions or advice on something.","example":"Any tips on keeping a remote team aligned when everyone's in a different time zone?"},{"situation":"Expressing doubt or asking someone to confirm","phrase":"Are you sure about that?","meaning":"Seeking confirmation; expressing mild disbelief.","example":"Are you sure about that? I heard the deadline got pushed back a week."},{"situation":"Considering everything together","phrase":"As a whole","meaning":"Overall; taking everything into account.","example":"As a whole, the campaign really outperformed what we expected going in."},{"situation":"Stating the limit of your knowledge","phrase":"As far as I know","meaning":"To the best of my knowledge.","example":"As far as I know, the contract still hasn't been signed — but don't quote me on that."},{"situation":"Stating a condition for something to work","phrase":"As long as","meaning":"Provided that; on the condition that.","example":"As long as we stay focused on the brief, I think we'll get there."},{"situation":"Describing growth or increasing complexity in your life","phrase":"As my life is growing…","meaning":"As my circumstances expand or develop.","example":"As my life is growing more complicated, I really need better systems in place."},{"situation":"Referring back to something already discussed","phrase":"As previously mentioned","meaning":"Referring to something said earlier. (More polite than \"as I told you.\")","example":"As previously mentioned, the hard launch date is the first week of March — no wiggle room."},{"situation":"Signaling that something should be obvious to the listener","phrase":"As you can tell","meaning":"As is apparent or obvious.","example":"As you can tell, I'm pretty fired up about this direction."},{"situation":"Connecting to what someone is currently discussing","phrase":"As you talk about","meaning":"In relation to what you're saying right now.","example":"As you talk about the rebrand, keep the core audience front of mind at all times."},{"situation":"Taking someone's agreement for granted before moving on","phrase":"Assuming that [name] is okay","meaning":"Taking for granted that someone agrees or is comfortable.","example":"Assuming that David is okay with the direction, we can move into production next week."},{"situation":"Introducing a contrasting point","phrase":"At the same time though","meaning":"However; on the other hand.","example":"It's a great concept. At the same time though, I'm not sure the timing is right."},{"situation":"Referring to something from the past","phrase":"Back in the day","meaning":"In the past; in earlier times.","example":"Back in the day, we'd spend three months on a single TV spot. Now we do it in three weeks."},{"situation":"Correcting an unfair negative perception of something","phrase":"Bad rap","meaning":"An unfair or undeserved negative reputation.","example":"Millennials get a bad rap for being disloyal to brands, but the data tells a very different story."},{"situation":"Describing two things that offset each other","phrase":"Balance each other out","meaning":"To complement or offset one another.","example":"Her instincts on culture and his rigor with data really balance each other out."},{"situation":"Light, playful conversation or teasing","phrase":"Banter","meaning":"Playful back-and-forth conversation or teasing.","example":"There was a lot of banter between them — you could tell they'd worked together forever."},{"situation":"Explaining a situation in simple, casual terms","phrase":"Basically what's happening is","meaning":"A casual way to explain the core of a situation.","example":"Basically what's happening is demand has gone through the roof and supply hasn't kept up."},{"situation":"When someone is charged with or blamed for something","phrase":"Be accused of","meaning":"To be charged with or blamed for something.","example":"The last thing we want is to be accused of greenwashing — every claim needs to be airtight."},{"situation":"Expressing capability or opportunity","phrase":"Be able to","meaning":"To have the capability or opportunity to do something.","example":"We want to be able to move fast without ever sacrificing quality."},{"situation":"Emphasizing that something is genuinely true e feeling stuck."},{"situation":"Asserting a personal view after acknowledging another side","phrase":"But I do think that","meaning":"Used to push back gently and assert your own perspective.","example":"I hear what you're saying, but I do think that the messaging needs a complete rework."},{"situation":"Highlighting a positive or redeeming quality","phrase":"But the beautiful thing about it is","meaning":"Pointing out what's good or exciting about something.","example":"But the beautiful thing about it is how simple the core idea actually is."},{"situation":"Getting to the main point after context","phrase":"But the point is","meaning":"Cutting to the core idea","example":"I know it's complicated. But the point is, we need to make a call by end of day."},{"situation":"Reminding the team to stay humble after success","phrase":"But we gotta be humble","meaning":"We need to remain modest and open-minded.","example":"We've had a great run, but we gotta be humble about how fast things can change."},{"situation":"Introducing a personal preference or approach","phrase":"But what I love to do is","meaning":"Sharing what you personally like to do in a given situation.","example":"But what I love to do is start from the consumer's perspective and work backwards from there."},{"situation":"Requesting a brief pause or focused discussion","phrase":"Can we… for a minute?","meaning":"Asking to pause and focus on something specific.","example":"Can we talk about the timeline for a minute? I genuinely don't think it's realistic."},{"situation":"Asking someone to elaborate","phrase":"Can you talk a little bit more about…?","meaning":"Asking someone to go deeper on a topic.","example":"Can you talk a little bit more about how you actually landed on that budget number?"},{"situation":"Describing where an idea or outcome came from","phrase":"Came out of","meaning":"Resulted from or originated from something.","example":"This entire campaign idea came out of a totally random conversation over lunch."},{"situation":"Questioning or pushing back against accepted norms","phrase":"Challenge those norms","meaning":"To push back against established or accepted standards.","example":"If we want to break through in this category, we have to challenge those norms head-on."},{"situation":"Describing something slightly bold or irreverent","phrase":"Cheeky","meaning":"Playfully bold or slightly irreverent in tone.","example":"That headline is a little cheeky, but I actually think it works perfectly for this audience."},{"situation":"Returning to a topic you set aside earlier","phrase":"Circle back to","meaning":"To come back to a topic later in the conversation.","example":"Let's circle back to the pricing question after we've heard from the client."},{"situation":"Describing an idea or phrase that feels overused","phrase":"Cliché","meaning":"An overused expression or idea that has lost its impact.","example":"I know it sounds like a total cliché, but authenticity really is what drives long-term loyalty."},{"situation":"Having encountered the same problem before","phrase":"Come across the exact same challenge","meaning":"To face the exact same obstacle or issue.","example":"Every founder I've talked to has come across the exact same challenge when trying to scale culture."},{"situation":"Something turning out to be useful at the right moment","phrase":"Come in handy","meaning":"To prove useful at a particular time.","example":"That extra buffer we built into the timeline is really going to come in handy right about now."},{"situation":"When something starts to have an effect or become relevant","phrase":"Come into play","meaning":"To become relevant or start having an effect.","example":"That's where consumer psychology really starts to come into play in a powerful way."},{"situation":"Identifying something shared between two things or groups","phrase":"Commonality","meaning":"A feature or characteristic shared by two or more things.","example":"What's the commonality between every single campaign that's actually worked for this brand?"},{"situation":"Gathering information from multiple sources into one place","phrase":"Compiling all the different sources","meaning":"Bringing together data or information from various places.","example":"We've spent the last two weeks compiling all the different sources into one unified research doc."},{"situation":"Describing something completely different from before","phrase":"Completely different from the one we had last year","meaning":"A clear contrast with a previous version or situation.","example":"This brief is completely different from the one we had last year — and honestly, that's a good thing."},{"situation":"Keeping a positive frame of mind through challenges","phrase":"Constantly reframe it in a positive way","meaning":"To keep shifting perspective toward the constructive side.","example":"When things go sideways, the best thing you can do is constantly reframe it in a positive way."},{"situation":"Keeping something under control","phrase":"Containment","meaning":"The action of limiting or controlling something.","example":"At this point, we're in containment mode — it's less about fixing the root cause and more about stopping the bleeding."},{"situation":"Reflecting on a missed opportunity or alternative response","phrase":"Could have been","meaning":"Expressing a past possibility that didn't happen.","example":"That could have been a massive disaster if we hadn't caught it early."},{"situation":"Referring to a chance to do something creative or innovative","phrase":"Creative opportunity","meaning":"An opening to do something new or imaginative.","example":"Don't just see this as a constraint — see it as a genuine creative opportunity."},{"situation":"Breaking something down into its parts to understand it better","phrase":"Deconstruct the system / campaign / challenge","meaning":"To analyze something by taking it apart systematically.","example":"Before we decide what to do next, let's deconstruct the campaign and figure out what actually worked."},{"situation":"Referring to the process of breaking something apart to analyze it","phrase":"Deconstruction","meaning":"The process of breaking something down to understand its parts.","example":"A full deconstruction of the strategy revealed exactly where we started losing momentum."},{"situation":"Putting something into action or rolling it out","phrase":"Deploy","meaning":"To put something into active use or distribute it.","example":"We're all set to deploy the new messaging across every channel starting next Monday."},{"situation":"When something is hard to identify or notice","phrase":"Difficult to recognize it","meaning":"Hard to spot or identify.","example":"The bias in the data is really subtle — it's difficult to recognize it without the right context."},{"situation":"Taking apart an old process before building a new one","phrase":"Dismantle","meaning":"To systematically take apart or remove a structure or system.","example":"We need to dismantle the old approval process completely before we build something that actually works."},{"situation":"Analyzing something carefully and in detail","phrase":"Dissect / dissect vocabulary","meaning":"To examine something closely and in detail.","example":"Let's dissect this brief line by line before we even think about creative directions."},{"situation":"Reducing something to its core or essential elements","phrase":"Distill down","meaning":"To extract what's most essential","example":"If you had to distill it down to just one sentence, what would you say the brand actually stands for?"},{"situation":"Starting to explore something in depth","phrase":"Dive into","meaning":"To begin exploring something deeply.","example":"Let's dive into the research findings before we start throwing ideas around the room."},{"situation":"Committing to getting something done no matter what","phrase":"Do whatever it takes","meaning":"To use any means necessary to achieve something.","example":"We will do whatever it takes to get this across the finish line — full stop."},{"situation":"Checking for understanding or agreement","phrase":"Do you know what I'm saying? / Does it make sense?","meaning":"Asking whether the listener follows or agrees.","example":"It's less about the output and more about a fundamental mindset shift — you know what I'm saying?"},{"situation":"Clarifying that you don't mean to offend","phrase":"Don't get me wrong","meaning":"Used before a potentially sensitive point to avoid misunderstanding.","example":"Don't get me wrong, the work is really solid — I just think we can push it a lot further."},{"situation":"Telling someone not to get confused","phrase":"Don't get twisted","meaning":"Don't misunderstand; don't get confused.","example":"Don't get twisted — this isn't a criticism at all, it's just an honest read on where we are."},{"situation":"Increasing commitment or investment in something","phrase":"Double down on our marketing effort","meaning":"To intensify focus or investment in something.","example":"Given the momentum we've built, right now is exactly the time to double down on our marketing effort."},{"situation":"Describing someone who is relaxed and easy to work with","phrase":"Easy going","meaning":"Relaxed and not easily upset.","example":"He's super easy going — he'll roll with whatever direction makes the most sense for the brand."},{"situation":"Warning that it's not hard to make mistakes in a situation","phrase":"Easy to screw things up","meaning":"It doesn't take much to make a mistake here.","example":"With this many stakeholders involved, it is really easy to screw things up if we're not fully aligned."},{"situation":"Describing the financial foundation of a plan or strategy","phrase":"Economic modeling is underpinning it","meaning":"Financial analysis forms the basis of this.","example":"The whole roadmap makes a lot more sense once you realize that economic modeling is underpinning it."},{"situation":"Raising the quality or level of something","phrase":"Elevate from… to…","meaning":"To raise something from one level to a higher one.","example":"Our goal here is to elevate this from a product-feature message to a full brand story."},{"situation":"Describing a visual or brand that fully expresses an emotion","phrase":"Embody a feeling","meaning":"To fully represent or express a particular emotion or quality.","example":"Every single frame of this film should embody a feeling of quiet, earned confidence."},{"situation":"When someone has used up their mental or emotional capacity","phrase":"Emotional bandwidth","meaning":"The mental or emotional capacity to deal with something.","example":"After that client call, I honestly don't have the emotional bandwidth for another round of revisions right now."},{"situation":"Understanding someone because you've had a similar experience","phrase":"Empathize","meaning":"To understand and share someone's feelings from shared experience.","example":"I can really empathize with that — I went through the exact same situation when I managed my first team."},{"situation":"Facing or coming across certain circumstances","phrase":"Encounter situations","meaning":"To come across or face particular circumstances.","example":"You'll encounter situations where the data and your gut feeling are pointing in completely opposite directions."},{"situation":"Describing something very large or significant","phrase":"Enormous","meaning":"Very large; of great size or impact.","example":"The shift in consumer behavior we've seen over the last two years has been absolutely enormous."},{"situation":"Talking about something that has been true since a certain point","phrase":"Ever since","meaning":"From a particular point in time until now.","example":"Ever since we updated the positioning, the numbers have just been steadily trending up."},{"situation":"Something that happens from time to time","phrase":"Every now and then","meaning":"Occasionally; from time to time.","example":"Every now and then, you just have to step back and look at the big picture."},{"situation":"Referring to each individual output or project","phrase":"Every piece of work","meaning":"Each individual creative or professional output.","example":"Every single piece of work we put out should have a clear, defensible idea sitting behind it."},{"situation":"Confirming agreement or precision","phrase":"Exactly","meaning":"That's correct; precisely.","example":"Exactly — that is the insight we've been missing this whole time."},{"situation":"Describing something visually striking or astonishing","phrase":"Eye-popping","meaning":"Visually striking or astonishing","example":"The growth numbers were honestly eye-popping — I had to look at the slide twice to make sure I was reading it right."},{"situation":"Accepting a point or argument you didn't initially agree with","phrase":"Fair enough","meaning":"That's reasonable; I accept that.","example":"You want more time to look it over? Fair enough — take the whole weekend."},{"situation":"Expressing genuine interest in something","phrase":"Fascinating","meaning":"Extremely interesting.","example":"What's really fascinating is just how different the two audience segments turn out to be when you actually dig in."},{"situation":"Referring to something that happened a short while ago","phrase":"Few weeks back","meaning":"A few weeks ago.","example":"We had a really solid conversation about this a few weeks back — really glad it's finally moving forward."},{"situation":"Making small improvements or adjustments","phrase":"Fine-tune / tweak","meaning":"To make small adjustments to improve something.","example":"Just tweak the opening paragraph slightly and I think this thing is ready to go."},{"situation":"Describing the risk of focusing only on the end goal","phrase":"Finish line holds you back from your potential","meaning":"Being too fixated on the endpoint can limit your growth along rious headwinds, but we made the call to forge ahead and figure it out as we go."},{"situation":"Something that caused anxiety or fear","phrase":"Freak me out","meaning":"To frighten or cause strong anxiety.","example":"Presenting to a room full of C-suite executives used to completely freak me out."},{"situation":"Introducing something ironic or unexpected","phrase":"Funny thing is…","meaning":"Used to flag something ironic or surprising.","example":"Funny thing is, the one direction we almost threw out ended up being the one that actually won."},{"situation":"Escaping blame or consequence for something","phrase":"Get away with","meaning":"To avoid punishment or consequence for something.","example":"You genuinely cannot get away with vague messaging in a category this brutally competitive."},{"situation":"Moving to the specific, practical details","phrase":"Get down to the nitty-gritty","meaning":"To get into the concrete specifics of something.","example":"Okay, enough of the high-level stuff — let's get down to the nitty-gritty of the execution plan."},{"situation":"Realizing you misunderstood something","phrase":"Get my wires crossed","meaning":"To confuse or misunderstand something.","example":"Sorry about that — I think I got my wires crossed. I had the wrong meeting on my calendar."},{"situation":"Expressing disbelief or surprise at something","phrase":"Get outta here","meaning":"Expression of shock or disbelief","example":"You finished the whole deck overnight? Get outta here — that's seriously impressive."},{"situation":"Acknowledging someone's contribution","phrase":"Give credit to","meaning":"To recognize and acknowledge someone's contribution.","example":"I have to give credit to the strategy team here — this brief is genuinely sharp."},{"situation":"Encouraging someone to try their best","phrase":"Give it your best shot","meaning":"Try as hard as you can.","example":"We might not win this one, but just give it your best shot and see what happens."},{"s n progress","phrase":"Hampering growth","meaning":"Obstructing or slowing down development.","example":"Slow internal approval cycles are seriously hampering our growth right now."},{"situation":"A small number of things or people","phrase":"Handful of","meaning":"A small number of","example":"Only a handful of clients actually took us up on the early access offer."},{"situation":"Introducing a contrasting point after acknowledging something","phrase":"Having said that / That said / That being said","meaning":"Introducing a qualification or contrasting point.","example":"The creative is really strong. That said, I do think the strategy needs another solid pass."},{"situation":"Describing an ongoing back-and-forth process","phrase":"Having worked with [org] and going back and forth","meaning":"Describing a prolonged collaborative or negotiation process.","example":"Having worked with the legal team and going back and forth on the language for weeks, we finally landed somewhere everyone was happy with."},{"situation":"Going somewhere or moving toward a destination","phrase":"Head over to","meaning":"To go towards","example":"After the workshop wraps up, we're heading over to the client's office for a full debrief."},{"situation":"Describing the core essence of a brand","phrase":"Heart of a brand","meaning":"The fundamental values or essence of a brand.","example":"At the very heart of this brand is a genuine, deeply held belief that design should make life better."},{"situation":"Introducing a recommendation","phrase":"Here's some advice for you","meaning":"Prefacing a piece of advice.","example":"Here's some advice for you — always know your audience cold before you ever walk into that room."},{"situation":"Introducing an important nuance or complication","phrase":"Here's the thing","meaning":"Used to flag something important, often a complication.","example":"Here's the thing — the brief sounds totally simple on the surface, but the internal politics are really complicated."},{"situation":"Referring to past trends or patterns","phrase":"Historically","meaning":"Based on what has happened in the past.","example":"Historically, Q4 has always been our strongest quarter for new business — let's not waste it."},{"situation":"When something is personally relevant or emotionally affecting","phrase":"Hit close to home","meaning":"To feel personally relevant or emotionally resonant.","example":"That documentary hit really close to home — I've been in almost exactly that situation before."},{"situation":"Asking someone to wait briefly","phrase":"Hold on a second","meaning":"Wait briefly; pause for a moment.","example":"Hold on a second — can you pull up that slide with the full breakdown? I want to look at the numbers again."},{"situation":"Asking for the group's opinion or reaction","phrase":"How do we feel about","meaning":"Asking for collective opinion or reaction.","example":"How do we feel about going with the bolder, more provocative creative direction?"},{"situation":"Asking how to take advantage of an opportunity","phrase":"How do we take advantage of this","meaning":"How can we best leverage this situation?","example":"The category is basically wide open right now — how do we take advantage of this before someone else does?"},{"situation":"Asking someone to describe their vision","phrase":"How do you envision…?","meaning":"Asking someone to describe what they picture or imagine.","example":"How do you envision the product actually looking and feeling six months after launch?"},{"situation":"Asking to what degree something applies","phrase":"To what extent…?","meaning":"Asking about the degree or scale of something.","example":"To what extent do you think the repositioning will actually change consumer behavior?"},{"situation":"Describing the quality of being modest","phrase":"Humility","meaning":"The quality of being modest and respectful.","example":"What makes her such an exceptional leader is her humility — she never, ever makes it about herself."},{"situation":"Giving a strong personal endorsement","phrase":"I absolutely recommend","meaning":"A strong personal endorsement of something.","example":"I absolutely recommend reading the full report before you form any kind of opinion on the direction."},{"situation":"Expressing deep appreciation for someone's efforts","phrase":"I am amazed / humbled by everything you do","meaning":"Expressing sincere gratitude and admiration.","example":"I am genuinely humbled by everything you've done to make this project actually happen."},{"situation":"Expressing strong admiration for something","phrase":"I am a big fan of","meaning":"Strongly admiring or appreciating something.","example":"I'm a big fan of the test-and-learn approach — it really takes the pressure off having to be perfect on day one."},{"situation":"Responding positively to \"how are you?\"","phrase":"I am doing great!","meaning":"A positive, enthusiastic response to a greeting.","example":"I'm doing great, thanks for asking — I'm really excited about what we're about to share with you today."},{"situation":"Expressing willingness to help","phrase":"I am more than happy to","meaning":"Very willing and glad to do something.","example":"I'm more than happy to walk you through the full breakdown if that would be helpful."},{"situation":"Unable to stop thinking about something","phrase":"I can't get it out of my head","meaning":"Something keeps coming back to mind involuntarily.","example":"That one insight from the focus group — I genuinely cannot get it out of my head."},{"situation":"Finding something intolerable","phrase":"I cannot bear that","meaning":"I find that completely intolerable.","example":"I cannot bear that kind of deliberate vagueness when we're this close to the launch date."},{"situation":"Reflecting on a missed or alternative response","phrase":"I could have said…","meaning":"Reflecting on what you wish you had said differently.","example":"Looking back, I could have said it a lot more diplomatically — but what's done is done."},{"situation":"Expressing genuine gratitude","phrase":"I do appreciate the fact that","meaning":"Sincerely thanking someone for something specific.","example":"I do appreciate the fact that you flagged this before it had the chance to turn into a much bigger problem."},{"situation":"Acknowledging a habit of over-committing","phrase":"I do have a tendency to say yes to everything","meaning":"Recognizing a personal pattern of taking on too much.","example":"I do have a tendency to say yes to everything that comes my way — it's something I'm actively working on."},{"situation":"Confirming a recollection from the past","phrase":"I do remember","meaning":"Confirming that you recall something.","example":"I do remember discussing this in the kickoff meeting — we flagged it as a potential risk right from the start."},{"situation":"Expressing genuine confusion about your own behavior","phrase":"I don't even know why","meaning":"Genuinely puzzled about one's own actions.","example":"I just kept refreshing the results page — I don't even know why I kept doing it."},{"situation":"Struggling to find the right words for something difficult","phrase":"I don't know how to say this","meaning":"Having trouble expressing something sensitive or awkward.","example":"I don't know how to say this, but I genuinely think we need to completely rethink the direction."},{"situation":"Choosing to cover something despite time pressure","phrase":"I don't wanna skip it because everyone is interested","meaning":"Deciding to include something even when time is short.","example":"I don't wanna skip this particular slide because I know everyone has questions about what the data is actually showing."},{"situation":"Expressing a personal impression or intuition","phrase":"I feel like","meaning":"Sharing a personal impression, often tentative.","example":"I feel like we're still dancing around the real issue here instead of just addressing it head on."},{"situation":"Sharing a personal realization or discovery","phrase":"I found that this has to be true in my life","meaning":"A personal realization from experience.","example":"I found that this has to be true in my life — you genuinely cannot outwork bad habits long-term."},{"situation":"Introducing a frank or candid statement","phrase":"I gotta be honest with you","meaning":"Prefacing a direct or candid remark.","example":"I gotta be honest with you — I don't think this direction is going to fly with the client at all."},{"situation":"Describing long-standing goals or ambitions","phrase":"I have aspiration / aspire to","meaning":"Having goals or ambitions you're working toward.","example":"I aspire to build something that actually changes the way people think about learning."},{"situation":"Describing a lifelong passion or interest","phrase":"I have been obsessed with… ever since I was a little kid","meaning":"A deep interest going back to childhood.","example":"I've been obsessed with typography ever since I was a little kid — I used to trace logos just for fun."},{"situation":"Referring to something acquired recently","phrase":"I just got it quite recently","meaning":"Acquired something not long ago.","example":"I just got it quite recently, but I've already put it through its paces pretty thoroughly."},{"situation":"Acting spontaneously without overthinking","phrase":"I just kinda jumped in there","meaning":"Acting without hesitation or overthinking.","example":"I wasn't totally sure it was my place, but I just kinda jumped in there — and honestly, it worked."},{"situation":"Emphasizing care or diligence about something","phrase":"I just want to make sure to","meaning":"Stressing that you want to be careful or thorough.","example":"I just want to make sure to cover all the bases here before we make any kind of commitment."},{"situation":"Wanting to advance to the next slide in a presentation","phrase":"I just wanna click ahead","meaning":"Wanting to m  that existed prior to a change.","example":"What was happening before was we were constantly reacting to what competitors were doing instead of setting our own agenda."},{"situation":"Summarizing the key takeaway from data or research","phrase":"What we understand from these findings","meaning":"Summarizing the main insight from research or data.","example":"What we understand from these findings is that trust is clearly and decisively the number one driver of purchase in this category."},{"situation":"Asking for someone's opinion or assessment","phrase":"What would you say","meaning":"Asking someone for their take or opinion.","example":"What would you say is the single biggest barrier to adoption that we're facing right now?"},{"situation":"Asking what will differentiate one thing from another","phrase":"What's gonna differentiate","meaning":"Asking what will set something apart from alternatives.","example":"There are three agencies pitching for this — so what's actually going to differentiate us from the other two?"},{"situation":"Expressing that something is entirely likeable","phrase":"What's not to love about this","meaning":"Expressing that there's no reason not to like something.","example":"It's bold, it's genuinely simple, and it's completely unexpected. What's not to love?"},{"situation":"Expressing surprise at something impressive","phrase":"What's stunning is","meaning":"Expressing surprise at something particularly striking.","example":"What's stunning is just how fast the audience responded — within literally 48 hours of the launch."},{"situation":"Identifying a distinctive quality of something","phrase":"What's unique about [our approach] is","meaning":"Highlighting what sets something apart from others.","example":"What's truly unique about our approach is that we always start with culture first, not just the product category."},{"situation":"Asking for the top insight or lesson from something","phrase":"What's your best take from…?","meaning":"Asking for the most valuable insight or lesson.","example":"What's your best take from all the research — what's the single one thing we absolutely need to act on immediately?"},{"situation":"Expressing indifference between options","phrase":"Whatever it is / whatever it may be","meaning":"Regardless of the specific details or option chosen.","example":"Whatever it is — a tweet, a full campaign, a packaging change — it absolutely has to feel completely intentional."},{"situation":"Introducing what comes to mind about a topic","phrase":"When I think of…","meaning":"Sharing the first thing that comes to mind about a topic.","example":"When I think of genuinely great brand storytelling, I always come right back to that early Apple campaign."},{"situation":"Introducing a topic or subject","phrase":"When it comes to","meaning":"Regarding; on the subject of.","example":"When it comes to the creative specifically, I genuinely think we've been playing it way too safe."},{"situation":"Directing attention to data or a subject","phrase":"When we look at the","meaning":"Drawing the group's attention to something specific.","example":"When we look at the full data picture, the pattern is really quite hard to ignore."},{"situation":"Expressing indifference between two options","phrase":"Whether… or… doesn't matter to me","meaning":"I'm equally fine with either option.","example":"Whether we end up launching in March or April honestly doesn't matter to me — what matters is that we're genuinely ready."},{"situation":"Noting that something is a separate, distinct matter","phrase":"Which is a different thing","meaning":"This is a separate, distinct matter from what's being discussed.","example":"Brand equity and short-term sales are definitely related, but they're really a different thing."},{"situation":"Discussing task assignment before wrapping up","phrase":"Who's gonna do what","meaning":"Clarifying responsibilities and task ownership.","example":"Before we close this out — let's be crystal clear on who's gonna do exactly what by Monday morning."},{"situation":"Considering everything discussed before concluding","phrase":"With all these things in mind / With all that being said","meaning":"Taking everything into account before concluding.","example":"With all these things in mind, my strong recommendation is that we take the more conservative approach here."},{"situation":"After acknowledging all the above, reaching a conclusion","phrase":"With that being said","meaning":"After considering everything, here is my point.","example":"With that being said, here is my actual, concrete recommendation for where we go from here."},{"situation":"Solving or figuring something out together","phrase":"Work that out together","meaning":"To figure something out collaboratively.","example":"We don't have all the answers yet, but let's work that out together right here in the room."},{"situation":"Expressing a hypothetical past outcome","phrase":"Would have been","meaning":"What the outcome might have been under different circumstances.","example":"That would have been exactly the right call a year ago — but the market has shifted significantly since then."},{"situation":"Making a polite request","phrase":"Would you be able to do [X]?","meaning":"A polite, indirect way of making a request.","example":"Would you be able to do a quick review of this before you head out for the day?"},{"situation":"Expressing casual agreement","phrase":"Yeah for sure","meaning":"Casual expression of agreement or confirmation.","example":"Yeah for sure — let's go with the bolder headline and see how it actually lands."},{"situation":"Responding that something is roughly accurate","phrase":"Yeah, pretty much","meaning":"That's roughly right; essentially yes.","example":"\"Is that the direction we're ultimately going?\" — \"Yeah, pretty much.\""},{"situation":"Expressing strong, enthusiastic agreement","phrase":"Yeah, 100%","meaning":"Strong and enthusiastic agreement.","example": h through it","meaning":"You need to keep going despite the difficulty.","example":"The very first month is always the hardest part — but you just gotta push through it."},{"situation":"Acknowledging someone's eventful or significant period","phrase":"You had quite a year that included…","meaning":"Recognizing someone's notable experiences over the past year.","example":"You had quite a year that included a full rebrand, a major new product launch, and a big global campaign."},{"situation":"Checking for understanding or agreement casually","phrase":"You know what I'm saying?","meaning":"Asking whether the listener follows or agrees.","example":"It's not really about being right — it's fundamentally about being trusted. You know what I'm saying?"},{"situation":"Crediting teamwork for a result","phrase":"You know, very much a collaborative effort","meaning":"Acknowledging that a result was achieved through teamwork.","example":"We're really proud of what came out of this — it was very much a collaborative effort from everyone."},{"situation":"Introducing an ironic or amusing observation","phrase":"You know, what's funny is…","meaning":"Flagging something ironic or unexpectedly amusing.","example":"You know, what's funny is, the one direction we almost completely killed ended up actually winning."},{"situation":"Suggesting something might not be necessary","phrase":"You might not even","meaning":"Suggesting that something may not be needed or expected.","example":"You might not even need a full second round of edits — the first draft was genuinely that strong."},{"situation":"Acknowledging multiple qualities in someone","phrase":"You not only… but also","meaning":"Recognizing multiple positive qualities simultaneously.","example":"You not only hit the brief perfectly, but also pushed it in a direction that nobody expected."},{"situation":"Enthusiastically recommending someone see something","phrase":"You should see [this]","meaning":"Strongly encouraging someone to experience something.","example":"You should see the new mockups — they came out absolutely incredible."},{"situation":"Noting remaining obstacles","phrase":"You still have some barrier","meaning":"There are still obstacles that need to be addressed.","example":"The concept is strong, but you still have some real barrier to entry with that price point."}]

s betrayal or action."}]

y neighborhood."},{"word":"snippy  (SNIP-ee)","meaning":"Curt and rude in speech; responding sharply as if annoyed.","example":"Why are you being so snippy? I was just asking a question."},{"word":"flaky  (FLAY-kee)","meaning":"Unreliable; likely to cancel plans or not follow through on commitments.","example":"Don't count on him — he's super flaky. He'll probably cancel last minute."},{"word":"shady  (SHAY-dee)","meaning":"Dishonest or suspicious; giving the impression that something illegal or unethical is going on.","example":"Something about that deal feels really shady. I wouldn't sign anything."},{"word":"sketchy  (SKECH-ee)","meaning":"Seeming dishonest, unsafe, or of questionable character; slightly shady.","example":"That neighborhood gets pretty sketchy after midnight."},{"word":"creepy  (KREE-pee)","meaning":"Causing an unpleasant feeling of unease or disgust; making your skin crawl.","example":"This guy at the bar kept staring at me. So creepy."},{"word":"cocky  (KAH-kee)","meaning":"Overly confident in a way that annoys others; arrogantly self-assured.","example":"He just got promoted and now he's acting all cocky about it."},{"word":"gutsy  (GUT-see)","meaning":"Brave and determined; willing to take risks even when it's scary.","example":"It was gutsy of her to quit her job and start her own thing."},{"word":"touchy  (TUCH-ee)","meaning":"Easily offended or upset; overly sensitive about particular topics.","example":"Don't bring up his ex — he's really touchy about it."},{"word":"feisty  (FY-stee)","meaning":"Lively, determined, and not afraid of an argument; spirited and spunky.","example":"She's feisty — she argued with the manager and actually got a refund."},{"word":"chatty  (CHAT-ee)","meaning":"Fond of talking a lot; friendly and talkative in a casual way.","example":"My Uber driver was so chatty. Talked the whole way there."},{"word":"nervy  (NER-vee)","meaning":"Boldly rude or impudent; having a lot of nerve to do something cheeky.","example":"It was pretty nervy of him to ask for a raise after being late every day."},{"word":"stingy  (STIN-jee)","meaning":"Unwilling to spend money or share things; extremely mean with money.","example":"He never tips. Like, ever. So stingy."},{"word":"wimpy  (WIM-pee)","meaning":"Weak and lacking in courage or determination; spineless.","example":"Don't be wimpy about it — just tell her how you feel."},{"word":"jumpy  (JUM-pee)","meaning":"Anxious and easily startled; on edge and nervous.","example":"The loud music kept making her jumpy all night."},{"word":"antsy  (ANT-see)","meaning":"Restless and unable to stay still; impatient and fidgety.","example":"I've been sitting in this waiting room for an hour. I'm getting antsy."},{"word":"whiny  (WHY-nee)","meaning":"Complaining in a feeble or irritating way; always grumbling without doing anything about it.","example":"He was so whiny about the food. Just eat it or don't."},{"word":"pompous  (POM-pus)","meaning":"Behaving as if you are more important or knowledgeable than you really are; self-important and arrogant.","example":"He gave this whole pompous speech about wine like he's some kind of expert."},{"word":"intrusive  (in-TROO-siv)","meaning":"Entering a situation where you're not wanted; violating someone's personal space or privacy.","example":"The questions got really intrusive — like, why do you need to know that?"},{"word":"empathetic  (em-puh-THET-ik)","meaning":"Able to understand and share the feelings of another person; genuinely caring about others' emotions.","example":"She's so empathetic — she always knows exactly what to say when you're going through something."},{"word":"domesticated  (duh-MES-tih-kay-ted)","meaning":"Comfortable with and good at home life — cooking, cleaning, taking care of things around the house.","example":"He's surprisingly domesticated — makes dinner every night and keeps the place spotless."},{"word":"heretical  (heh-RET-ih-kul)","meaning":"Going against widely accepted beliefs or norms; seen as shocking or unacceptable to the mainstream.","example":"I know it's heretical, but I actually think the sequel is better than the original."},{"word":"passive-aggressive  (PAS-iv uh-GRES-iv)","meaning":"Expressing hostility or resentment indirectly rather than openly; sulking or giving the silent treatment instead of speaking up.","example":"He didn't say anything but just slammed every door. So passive-aggressive."},{"word":"condescending  (kon-deh-SEN-ding)","meaning":"Talking down to people as if they're less intelligent or capable than you; patronizing.","example":"The way she explained it was so condescending — like we were five years old."},{"word":"self-righteous  (SELF-RY-chus)","meaning":"Convinced you are morally superior to others; sanctimonious and preachy about your own virtue.","example":"I agree with what he's saying but he's so self-righteous about it."},{"word":"overbearing  (oh-ver-BAIR-ing)","meaning":"Domineering and impossible to ignore; trying to control everyone around you.","example":"Her mom is so overbearing — she calls like three times a day."},{"word":"high-strung  (HY-strung)","meaning":"Very nervous and easily stressed; wound up too tight emotionally.","example":"She's a little high-strung — just give her a heads-up before any changes."},{"word":"catty  (KAT-ee)","meaning":"Making subtle, mean-spirited comments about others; bitchy in a sneaky way.","example":"The comments in that group chat were getting really catty."},{"word":"upbeat  (UP-beet)","meaning":"Positive and cheerful; having an optimistic, energetic attitude.","example":"She was surprisingly upbeat given everything she's dealing with."},{"word":"cheerful  (CHEER-ful)","meaning":"Noticeably happy and in good spirits; radiating warmth and positivity.","example":"He's always cheerful at work, even on Monday mornings."},{"word":"jolly  (JAH-lee)","meaning":"Full of high spirits and fun; jovially happy — think Santa Claus energy.","example":"Everyone was jolly by the end of the night. Good party."},{"word":"chipper  (CHIP-er)","meaning":"Lively and cheerful in an energetic way; perkily upbeat.","example":"You're very chipper this morning — did something good happen?"},{"word":"giddy  (GID-ee)","meaning":"Excitedly happy to the point of feeling light-headed; giggly and elated.","example":"She was giddy all day after he texted her back."},{"word":"droopy  (DROO-pee)","meaning":"Hanging or falling downward in a tired or sad way; lacking energy or brightness.","example":"He walked in looking all droopy — clearly did not sleep last night."},{"word":"tipsy  (TIP-see)","meaning":"Slightly drunk; feeling the pleasant early effects of alcohol without being wasted.","example":"Two glasses in and I'm already tipsy. I'm such a lightweight."},{"word":"buzzed  (BUZZD)","meaning":"Pleasantly affected by alcohol; a step past tipsy but still functional.","example":"I'm not drunk, just buzzed. Big difference."},{"word":"hammered  (HAM-erd)","meaning":"Very drunk; well past the point of being in control.","example":"He was absolutely hammered by 9pm. It was embarrassing."},{"word":"wasted  (WAY-sted)","meaning":"Extremely drunk; completely out of it from alcohol.","example":"I don't remember anything after midnight — I was wasted."},{"word":"crispy  (KRIS-pee)","meaning":"Pleasantly firm and crunchy on the outside, especially when fried or baked well.","example":"The skin on that chicken was perfectly crispy. So good."},{"word":"crunchy  (KRUN-chee)","meaning":"Making a loud crunching sound when bitten; firm enough to crunch.","example":"I like my peanut butter crunchy, not smooth."},{"word":"gooey  (GOO-ee)","meaning":"Soft, sticky, and wet in a pleasantly indulgent way — think melted cheese or brownie centers.","example":"That brownie was so gooey in the middle. Insane."},{"word":"chewy  (CHOO-ee)","meaning":"Needing a lot of chewing; not tender. Can be positive (bagel) or negative (tough steak).","example":"These cookies are chewy and soft — exactly how I like them."},{"word":"soggy  (SAW-gee)","meaning":"Soft and wet from soaking up too much liquid; unpleasantly waterlogged.","example":"I hate soggy fries. Just ruin the whole meal."},{"word":"mushy  (MUSH-ee)","meaning":"Soft and pulpy to the point of being unpleasant; overcooked or over-ripe.","example":"The pasta was way overcooked — totally mushy."},{"word":"greasy  (GREE-see)","meaning":"Covered in or having too much oil or fat; unpleasantly oily.","example":"I love greasy diner food when I'm hungover."},{"word":"salty  (SAWL-tee)","meaning":"Tasting of salt. In slang: bitter, resentful, or annoyed about something.","example":"He's still salty about losing the game last week."},{"word":"spicy  (SPY-see)","meaning":"Having a strong, hot flavor from chili or spices. Also informally: edgy or provocative.","example":"That tweet was spicy. She's not holding back."},{"word":"zesty  (ZES-tee)","meaning":"Having a sharp, refreshing flavor, often from citrus. Also: energetic and lively.","example":"This lemon dressing is so zesty — I need the recipe."},{"word":"tangy  (TANG-ee)","meaning":"Having a strong, sharp, slightly sour taste that tingles the tongue.","example":"The sauce is a little tangy — kind of like a vinegar BBQ thing."},{"word":"fishy  (FISH-ee)","meaning":"Smelling or tasting of fish. In everyday use: suspicious or dishonest.","example":"His story doesn't add up. Something smells fishy."},{"word":"nutty  (NUT-ee)","meaning":"Tasting or smelling of nuts. Informally: slightly crazy or eccentric.","example":"This cheese has a really nutty flavor — in a good way."},{"word":"buttery  (BUT-er-ee)","meaning":"Tasting rich and smooth like butter; also used for a very smooth texture.","example":"The chardonnay was super buttery. A bit too much for me."},{"word":"boozy  (BOO-zee)","meaning":"Containing a lot of alcohol; tasting strongly of alcohol. Also describes a heavy drinker.","example":"These cocktails are really boozy — only have one if you're driving."},{"word":"fragrant  (FRAY-grunt)","meaning":"Having a pleasant, sweet smell; aromatic and inviting to the nose.","example":"The bread just came out of the oven and it's so fragrant in here."},{"word":"soft and tender  (SAWFT and TEN-der)","meaning":"Yielding easily to touch; cooked or prepared so that it melts in the mouth.","example":"The short rib was fall-apart soft and tender. Cooked it for six hours."},{"word":"raspy  (RAS-pee)","meaning":"Having a rough, scratchy quality — usually describing a voice.","example":"She had this really raspy voice, like she'd been singing all night. Super cool actually."},{"word":"muggy  (MUG-ee)","meaning":"Unpleasantly warm and humid; the kind of weather that makes you sweat just standing still.","example":"Tokyo in August is so muggy. I can't handle it."},{"word":"chilly  (CHIL-ee)","meaning":"Noticeably cold but not freezing; cool enough to make you want a jacket.","example":"It's a bit chilly out — maybe grab a jacket."},{"word":"breezy  (BREE-zee)","meaning":"Pleasantly windy. Also describes someone who is casual and relaxed.","example":"It's breezy out but sunny — perfect for a walk."},{"word":"foggy  (FAW-gee)","meaning":"Full of fog and hard to see through. Also: mentally unclear.","example":"Sorry, I'm still a bit foggy — I just woke up."},{"word":"dusty  (DUS-tee)","meaning":"Covered with a layer of dust; not used or cleaned in a long time.","example":"This room is so dusty. When did we last open it?"},{"word":"rusty  (RUS-tee)","meaning":"Covered in rust. Figuratively: out of practice and not as sharp as you used to be.","example":"My French is a bit rusty — I haven't spoken it in years."},{"word":"musty  (MUS-tee)","meaning":"Having a stale, damp smell from being closed up for too long; smelling old.","example":"The cabin smelled kind of musty, but it was fine once we opened the windows."},{"word":"stuffy  (STUF-ee)","meaning":"Lacking fresh air. Also describes someone who is overly formal and conservative r bones are visible; very skinny.","example":"You can tell she hasn't been eating well — she looks bony."},{"word":"scruffy  (SKRUF-ee)","meaning":"Untidy and slightly dirty in appearance; messy-looking.","example":"He showed up to the interview looking all scruffy. Not a good look."},{"word":"sloppy  (SLAH-pee)","meaning":"Careless and untidy; lacking attention to detail or effort.","example":"The report was really sloppy — typos everywhere. Send it back."},{"word":"frumpy  (FRUM-pee)","meaning":"Dressed in clothes that are dull and unfashionable; dowdy.","example":"That outfit makes her look frumpy — she can do so much better."},{"word":"fancy  (FAN-see)","meaning":"Elaborate and expensive-looking; more decorative or upscale than usual.","example":"Oh, we're getting fancy tonight — are you buying?"},{"word":"gaudy  (GAW-dee)","meaning":"Extravagantly bright or showy in a way that is tasteless or vulgar.","example":"The decorations were so gaudy — like, rhinestones everywhere."},{"word":"tacky  (TAK-ee)","meaning":"Showing poor taste; cheap and vulgar-looking.","example":"Charging guests a cover fee at your own birthday party is so tacky."},{"word":"shabby  (SHAB-ee)","meaning":"In a poor condition from age or overuse; worn out and neglected-looking.","example":"The hotel looked nice in photos but it was pretty shabby in person."},{"word":"snazzy  (SNAZ-ee)","meaning":"Stylish and attractive in a flashy way; looking impressively neat or sharp.","example":"Nice jacket — very snazzy."},{"word":"classy  (KLAS-ee)","meaning":"Stylish and sophisticated; showing high quality and good taste.","example":"She handled the whole situation really classy. Impressed."},{"word":"beefy  (BEE-fee)","meaning":"Large, solid, and muscular; impressively substantial in size or build.","example":"That was a beefy book — 600 pages. But worth it."},{"word":"pricey  (PRY-see)","meaning":"More expensive than expected or desired; on the costly side.","example":"The food was great but a little // ── State ──
let activeDeckId  = null;
let deck_cfg      = null;
let phrases       = [];
let deck          = [];
let learned       = [];
let saved         = new Set(); // indices of saved cards for this deck
let current       = 0;
let stage         = 0;
let busy          = false;
let savedReview   = false;    // true when reviewing saved cards only
let initialDeckLen = 0;       // for ANKI progress tracking

// ── SRS (SM-2 Spaced Repetition) ──
const DAY_MS = 86400000;
let srsData = {};  // phraseIndex -> { interval, ef, due }

function srsLoad(id) {
  try { return JSON.parse(localStorage.getItem('pc_srs_' + id) || '{}'); } catch { return {}; }
}
function srsPersist() {
  localStorage.setItem('pc_srs_' + activeDeckId, JSON.stringify(srsData));
}

// rating: 0=Again, 1=Hard, 2=Good, 3=Easy
function srsSchedule(phraseIdx, rating) {
  const now  = Date.now();
  const card = srsData[phraseIdx] || { interval: 0, ef: 2.5 };
  const { interval, ef } = card;
  let newInterval, newEf = ef;

  if (rating === 0) {
    srsData[phraseIdx] = { interval: 0, ef: Math.max(1.3, ef - 0.2), due: now + 600000 };
    return;
  }
  if (interval === 0) {
    newInterval = rating === 3 ? 4 : 1;
  } else {
    if      (rating === 1) newInterval = Math.max(1, Math.round(interval * 1.2));
    else if (rating === 2) newInterval = Math.max(1, Math.round(interval * ef));
    else                   newInterval = Math.max(4, Math.round(interval * ef * 1.3));
  }
  if      (rating === 1) newEf = Math.max(1.3, ef - 0.15);
  else if (rating === 3) newEf = Math.min(3.0, ef + 0.15);
  srsData[phraseIdx] = { interval: newInterval, ef: newEf, due: now + newInterval * DAY_MS };
}

function srsNextLabel(phraseIdx, rating) {
  const card = srsData[phraseIdx] || { interval: 0, ef: 2.5 };
  const { interval, ef } = card;
  if (rating === 0) return '<10m';
  let d;
  if (interval === 0) d = rating === 3 ? 4 : 1;
  else if (rating === 1) d = Math.max(1, Math.round(interval * 1.2));
  else if (rating === 2) d = Math.max(1, Math.round(interval * ef));
  else                   d = Math.max(4, Math.round(interval * ef * 1.3));
  return d + 'd';
}

function buildAnkiQueue() {
  const now = Date.now();
  const newCards = [], dueCards = [];
  phrases.forEach((_, i) => {
    const c = srsData[i];
    if (!c || !c.due) newCards.push(i);
    else if (c.due <= now) dueCards.push(i);
  });
  dueCards.sort((a, b) => srsData[a].due - srsData[b].due);
  return [...dueCards, ...shuffle(newCards)];
}

function updateAnkiIntervals() {
  const idx = deck[current];
  document.getElementById('ri-0').textContent = '<10m';
  document.getElementById('ri-1').textContent = srsNextLabel(idx, 1);
  document.getElementById('ri-2').textContent = srsNextLabel(idx, 2);
  document.getElementById('ri-3').textContent = srsNextLabel(idx, 3);
}

function updateActionBtns() {
  const isAnki   = !!deck_cfg.anki;
  const revealed = stage >= deck_cfg.stages - 1;
  document.getElementById('regular-btns').style.display = isAnki ? 'none' : '';
  const ankiWrap = document.getElementById('anki-wrap');
  ankiWrap.classList.toggle('hidden', !isAnki || !revealed);
  if (isAnki && revealed) { updateAnkiIntervals(); updateSaveBtn(); }
}
