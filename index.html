<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Phrase Cards">
  <meta name="theme-color" content="#6366f1">
  <title>Phrase Cards</title>
  <link rel="manifest" href="manifest.json">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Segoe UI', sans-serif;
      background: #f0e8d8; color: #0a0a0a;
    }

    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px 20px;
      padding-top: max(env(safe-area-inset-top, 0px), 24px);
      padding-bottom: max(env(safe-area-inset-bottom, 0px), 24px);
    }
    .screen.hidden { display: none; }

    /* ── Home ── */
    .home-logo  { font-size: 36px; margin-bottom: 16px; }
    .home-title {
      font-size: 34px; font-weight: 900; letter-spacing: -1.5px;
      margin-bottom: 6px; color: #0a0a0a;
    }
    .home-sub   { font-size: 14px; color: #6b6457; margin-bottom: 44px; letter-spacing: .2px; }

    .deck-grid { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 10px; }
    .deck-card {
      width: 100%; padding: 20px 20px; border: none; border-radius: 14px;
      cursor: pointer; text-align: left; display: flex; align-items: center; gap: 14px;
      transition: transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .deck-card:active { transform: scale(.97); }
    .deck-card.indigo { background: #1844c8; color: white; }
    .deck-card.orange { background: #d93d1c; color: white; }
    .deck-card.rose   { background: #c0930a; color: white; }
    .deck-card.teal   { background: #0a8f7a; color: white; }
    .deck-card.violet { background: #6409c4; color: white; }
    .deck-icon { font-size: 26px; flex-shrink: 0; }
    .deck-info { flex: 1; }
    .deck-name  { font-size: 16px; font-weight: 800; margin-bottom: 2px; letter-spacing: -.2px; }
    .deck-count { font-size: 12px; opacity: .7; }

    /* ── Study ── */
    .study-inner {
      width: 100%; max-width: 420px;
      display: flex; flex-direction: column; align-items: center;
    }
    .top-bar {
      width: 100%; display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 18px;
    }
    .icon-btn {
      background: none; border: none; font-size: 22px;
      cursor: pointer; padding: 6px; line-height: 1;
      -webkit-tap-highlight-color: transparent; color: #0a0a0a;
    }
    .count-pill {
      font-size: 12px; font-weight: 700; color: #6b6457;
      background: rgba(0,0,0,.07); padding: 5px 14px; border-radius: 99px;
      letter-spacing: .3px;
    }
    .progress-track {
      width: 100%; height: 4px; background: rgba(0,0,0,.12);
      border-radius: 2px; margin-bottom: 22px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 2px;
      transition: width .4s cubic-bezier(.4,0,.2,1);
    }
    .fill-indigo { background: #1844c8; }
    .fill-orange { background: #d93d1c; }
    .fill-rose   { background: #c0930a; }
    .fill-teal   { background: #0a8f7a; }
    .fill-violet { background: #6409c4; }

    /* Stage dots */
    .stage-dots { display: flex; gap: 6px; margin-bottom: 20px; min-height: 19px; }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(0,0,0,.15); transition: background .2s;
    }
    .dot.active-indigo { background: #1844c8; }
    .dot.active-orange { background: #d93d1c; }
    .dot.active-rose   { background: #c0930a; }
    .dot.active-teal   { background: #0a8f7a; }
    .dot.active-violet { background: #6409c4; }

    /* Card */
    .card-area { width: 100%; position: relative; margin-bottom: 22px; }
    .card {
      width: 100%; min-height: 250px; background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 4px 32px rgba(0,0,0,.10);
      padding: 32px 28px; cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: pan-y; will-change: transform; user-select: none;
    }
    .card.no-transition { transition: none !important; }

    @keyframes flyRight { to { transform: translateX(130%) rotate(15deg); opacity: 0; } }
    @keyframes flyLeft  { to { transform: translateX(-130%) rotate(-15deg); opacity: 0; } }
    @keyframes popIn    { from { transform: scale(.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .card.fly-right { animation: flyRight .28s ease-in forwards; }
    .card.fly-left  { animation: flyLeft  .28s ease-in forwards; }
    .card.pop-in    { animation: popIn .22s ease-out; }

    .card-label {
      font-size: 10px; font-weight: 800; letter-spacing: 1.5px;
      text-transform: uppercase; margin-bottom: 12px;
    }
    .label-indigo { color: #1844c8; }
    .label-orange { color: #d93d1c; }
    .label-rose   { color: #c0930a; }
    .label-teal   { color: #0a8f7a; }
    .label-violet { color: #6409c4; }

    .card-situation { font-size: clamp(14px, 3.8vw, 17px); color: #5a5040; line-height: 1.7; }
    .card-phrase    { font-size: clamp(18px, 4.5vw, 23px); font-weight: 900; line-height: 1.4; color: #0a0a0a; letter-spacing: -.3px; }
    .card-meaning   { font-size: 14px; color: #6b6457; line-height: 1.7; }
    .card-divider   { width: 28px; height: 2px; background: #e8dece; border-radius: 1px; margin: 14px auto; }
    .card-tap-hint  { font-size: 11px; color: #b8ac9c; margin-top: 20px; letter-spacing: .5px; }
    .card-example   { font-size: 13px; color: #8a7e6e; line-height: 1.65; margin-top: 10px; font-style: italic; }

    /* Swipe labels */
    .swipe-label {
      position: absolute; top: 50%; transform: translateY(-50%);
      font-size: 11px; font-weight: 900; letter-spacing: 1.2px;
      padding: 6px 14px; border-radius: 6px;
      opacity: 0; pointer-events: none; border: 2px solid;
      text-transform: uppercase;
    }
    .swipe-label.got   { right: 10px; color: #0a7c40; background: #d4f5e0; border-color: #0a7c40; }
    .swipe-label.again { left: 10px;  color: #c01818; background: #fde8e8; border-color: #c01818; }

    /* Buttons */
    .action-btns { width: 100%; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .action-btn {
      padding: 15px 8px; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      -webkit-tap-highlight-color: transparent; transition: transform .1s;
    }
    .action-btn:active { transform: scale(.96); }
    .btn-again { background: #0a0a0a; color: #ffffff; }
    .btn-got   { background: #1844c8; color: #ffffff; }
    .btn-save  { background: #e8dece; color: #5a4a28; }
    .btn-save.saved { background: #f5d978; color: #3a2a00; }
    .btn-icon  { font-size: 18px; }
    .btn-text  { font-size: 11px; font-weight: 800; letter-spacing: .4px; }

    /* ── Complete ── */
    .complete-emoji { font-size: 64px; margin-bottom: 16px; }
    .complete-title { font-size: 30px; font-weight: 900; margin-bottom: 8px; letter-spacing: -1px; color: #0a0a0a; }
    .complete-desc  { color: #6b6457; font-size: 14px; margin-bottom: 36px; text-align: center; }
    .stats-row { display: flex; gap: 14px; margin-bottom: 36px; }
    .stat-box {
      text-align: center; background: white; border-radius: 14px;
      padding: 16px 28px; box-shadow: 0 2px 16px rgba(0,0,0,.07);
    }
    .stat-num   { font-size: 32px; font-weight: 900; color: #1844c8; letter-spacing: -1px; }
    .stat-label { font-size: 11px; color: #9a8e80; margin-top: 2px; letter-spacing: .5px; text-transform: uppercase; font-weight: 700; }
    .complete-actions { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 10px; }
    .btn-block {
      width: 100%; padding: 16px; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 800; cursor: pointer; letter-spacing: -.1px;
      -webkit-tap-highlight-color: transparent; transition: transform .1s;
    }
    .btn-block:active { transform: scale(.97); }
    .btn-primary   { background: #0a0a0a; color: white; }
    .btn-secondary { background: #e8dece; color: #3a3028; }

    /* ── Menu ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(10,10,10,.5);
      display: flex; align-items: flex-end; justify-content: center;
      padding: 20px; z-index: 100;
    }
    .overlay.hidden { display: none; }
    .menu-sheet { background: #f0e8d8; border-radius: 18px; padding: 20px; width: 100%; max-width: 420px; }
    .menu-title {
      font-size: 10px; font-weight: 800; color: #9a8e80;
      margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px;
    }
    .menu-item {
      width: 100%; padding: 14px 16px; border: none; border-radius: 10px;
      background: #ffffff; font-size: 15px; font-weight: 700; color: #0a0a0a;
      cursor: pointer; text-align: left; margin-bottom: 8px;
      -webkit-tap-highlight-color: transparent;
    }
    .menu-cancel {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      background: #e8dece; font-size: 14px; font-weight: 800; color: #6b6457;
      cursor: pointer; margin-top: 8px; -webkit-tap-highlight-color: transparent;
      letter-spacing: .2px;
    }
  </style>
</head>
<body>

<!-- ══ HOME ══ -->
<div class="screen" id="home-screen">
  <div class="home-logo">📖</div>
  <div class="home-title">Phrase Cards</div>
  <div class="home-sub">Choose your deck</div>
  <div class="deck-grid">
    <button class="deck-card indigo" id="deck-takaki">
      <span class="deck-icon">⭐</span>
      <div class="deck-info">
        <div class="deck-name">Takaki Selected</div>
        <div class="deck-count">451 phrases · 3 stages</div>
      </div>
    </button>
    <button class="deck-card orange" id="deck-slang">
      <span class="deck-icon">🔥</span>
      <div class="deck-info">
        <div class="deck-name">Slang &amp; Class</div>
        <div class="deck-count">222 phrases · 2 stages</div>
      </div>
    </button>
    <button class="deck-card rose" id="deck-drama">
      <span class="deck-icon">🎭</span>
      <div class="deck-info">
        <div class="deck-name">Drama English</div>
        <div class="deck-count">26 phrases · 2 stages</div>
      </div>
    </button>
    <button class="deck-card teal" id="deck-judy">
      <span class="deck-icon">🎙️</span>
      <div class="deck-info">
        <div class="deck-name">Judy &amp; Jesse</div>
        <div class="deck-count">10 phrases · 2 stages</div>
      </div>
    </button>
    <button class="deck-card violet" id="deck-adj">
      <span class="deck-icon">✏️</span>
      <div class="deck-info">
        <div class="deck-name">Daily Adjective</div>
        <div class="deck-count">147 words · 3 stages</div>
      </div>
    </button>
  </div>
</div>

<!-- ══ STUDY ══ -->
<div class="screen hidden" id="study-screen">
  <div class="study-inner">
    <div class="top-bar">
      <button class="icon-btn" id="menu-btn">⋯</button>
      <div class="count-pill" id="count-pill">0 / 0</div>
      <button class="icon-btn" id="home-btn">⌂</button>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="stage-dots" id="stage-dots"></div>
    <div class="card-area">
      <div class="card" id="card">
        <div id="card-content"></div>
        <div class="card-tap-hint" id="tap-hint"></div>
      </div>
      <div class="swipe-label got"   id="label-got">GOT IT ✓</div>
      <div class="swipe-label again" id="label-again">AGAIN ✗</div>
    </div>
    <div class="action-btns">
      <button class="action-btn btn-again" id="btn-again">
        <span class="btn-icon">↩</span><span class="btn-text">Again</span>
      </button>
      <button class="action-btn btn-save" id="btn-save">
        <span class="btn-icon">🔖</span><span class="btn-text">Save</span>
      </button>
      <button class="action-btn btn-got" id="btn-got">
        <span class="btn-icon">✓</span><span class="btn-text">Got it</span>
      </button>
    </div>
  </div>
</div>

<!-- ══ COMPLETE ══ -->
<div class="screen hidden" id="complete-screen">
  <div class="complete-emoji">🎉</div>
  <div class="complete-title">Session Complete!</div>
  <div class="complete-desc" id="complete-desc"></div>
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="stat-got">0</div>
      <div class="stat-label">Got it</div>
    </div>
  </div>
  <div class="complete-actions">
    <button class="btn-block btn-primary"   id="btn-restart">Study again</button>
    <button class="btn-block btn-secondary" id="btn-back-home">Back to home</button>
  </div>
</div>

<!-- ══ MENU ══ -->
<div class="overlay hidden" id="overlay">
  <div class="menu-sheet">
    <div class="menu-title">Options</div>
    <button class="menu-item" id="menu-shuffle">🔀 Shuffle &amp; restart</button>
    <button class="menu-item" id="menu-saved">🔖 Review saved (<span id="saved-count">0</span>)</button>
    <button class="menu-cancel" id="menu-cancel">Cancel</button>
  </div>
</div>

<script>
'use strict';

const DECKS = {
  takaki: {
    color: 'indigo',
    stages: 3,
    phrases: [{"situation":"When you want to add a brief point to what someone just said","phrase":"A couple of","meaning":"A few, a small number of","example":"I have a couple of things I want to run by you before the meeting."},{"situation":"When validating that something many people experience is real","phrase":"A lot of people… That's a real thing.","meaning":"Used to confirm that something is a common, genuine experience.","example":"A lot of people feel totally burned out after remote work. That's a real thing."},{"situation":"Referring to a single unit of media or content","phrase":"A piece of content","meaning":"One item of media — an article, video, or post.","example":"We need at least one solid piece of content going out every single week."},{"situation":"When crediting a completed creative or professional output","phrase":"A piece of work","meaning":"A finished creative or professional output.","example":"Every piece of work that leaves this agency should make us proud."},{"situation":"Describing a large quantity of something","phrase":"A ton of / a bunch of","meaning":"A large amount of something","example":"We got a ton of responses after the campaign went live."},{"situation":"Shifting from a joke to a sincere point","phrase":"All seriousness / In all seriousness","meaning":"Used to signal you're being genuinely serious now.","example":"Okay, in all seriousness — we need to talk about the budget."},{"situation":"Describing something that covers everything from start to finish","phrase":"All the way through","meaning":"Completely, from beginning to end.","example":"I read the entire brief all the way through before I touched the creative."},{"situation":"Referring collectively to several things just mentioned","phrase":"All these things","meaning":"Everything mentioned so far","example":"All these things — the timeline, the budget, the team bandwidth — they all need to align."},{"situation":"Describing what something makes possible","phrase":"Allow us to do","meaning":"Enables or gives us the ability to do something.","example":"This tool will allow us to do things in hours that used to take days."},{"situation":"Introducing a contrasting point after acknowledging something","phrase":"Although","meaning":"Despite the fact that; even though.","example":"Although the numbers look strong, I'm still not fully convinced we're targeting the right audience."},{"situation":"Describing something that has always had a consistent focus","phrase":"Always has been centered","meaning":"Has consistently focused on something.","example":"This brand has always been centered on the idea of making people feel seen."},{"situation":"Referencing a colleague's point to introduce a change","phrase":"And so, like [name] mentioned, we're really doing things a little bit differently this year.","meaning":"Building on a colleague's point to introduce a new direction.","example":"And so, like Sarah mentioned, we're really doing things a little bit differently this year."},{"situation":"Casual transition to describe a reaction or next step","phrase":"And then you have to be like","meaning":"Informal way to describe how you or someone responded.","example":"And then you have to be like, okay, cool, let me just take a breath and start over."},{"situation":"Introducing a new, noteworthy point","phrase":"Another interesting thing is that","meaning":"Used to add a new notable point to the conversation.","example":"Another interesting thing is that the youngest cohort is actually the most brand loyal."},{"situation":"Asking for practical advice","phrase":"Any tips on…?","meaning":"Asking for suggestions or advice on something.","example":"Any tips on keeping a remote team aligned when everyone's in a different time zone?"},{"situation":"Expressing doubt or asking someone to confirm","phrase":"Are you sure about that?","meaning":"Seeking confirmation; expressing mild disbelief.","example":"Are you sure about that? I heard the deadline got pushed back a week."},{"situation":"Considering everything together","phrase":"As a whole","meaning":"Overall; taking everything into account.","example":"As a whole, the campaign really outperformed what we expected going in."},{"situation":"Stating the limit of your knowledge","phrase":"As far as I know","meaning":"To the best of my knowledge.","example":"As far as I know, the contract still hasn't been signed."},{"situation":"Stating a condition for something to work","phrase":"As long as","meaning":"Provided that; on the condition that.","example":"As long as we stay focused on the brief, I think we'll get there."},{"situation":"Describing growth or increasing complexity in your life","phrase":"As my life is growing…","meaning":"As my circumstances expand or develop.","example":"As my life is growing more complicated, I really need better systems."},{"situation":"Referring back to something already discussed","phrase":"As previously mentioned","meaning":"Referring to something said earlier. (More polite than \"as I told you.\")","example":"As previously mentioned, the hard launch date is the first week of March."},{"situation":"Signaling that something should be obvious to the listener","phrase":"As you can tell","meaning":"As is apparent or obvious.","example":"As you can tell, I'm pretty fired up about this direction."},{"situation":"Connecting to what someone is currently discussing","phrase":"As you talk about","meaning":"In relation to what you're saying right now.","example":"As you talk about the rebrand, keep the core audience front of mind."},{"situation":"Taking someone's agreement for granted before moving on","phrase":"Assuming that [name] is okay","meaning":"Taking for granted that someone agrees or is comfortable.","example":"Assuming that David is okay with the direction, we can move into production next week."},{"situation":"Introducing a contrasting point","phrase":"At the same time though","meaning":"However; on the other hand.","example":"It's a great concept. At the same time though, I'm not sure the timing is right."},{"situation":"Referring to something from the past","phrase":"Back in the day","meaning":"In the past; in earlier times.","example":"Back in the day, we'd spend three months on a TV spot. Now we do it in three weeks."},{"situation":"Correcting an unfair negative perception of something","phrase":"Bad rap","meaning":"An unfair or undeserved negative reputation.","example":"Millennials get a bad rap for being disloyal, but the data tells a different story."},{"situation":"Describing two things that offset each other","phrase":"Balance each other out","meaning":"To complement or offset one another.","example":"Her instincts on culture and his rigor with data really balance each other out."},{"situation":"Light, playful conversation or teasing","phrase":"Banter","meaning":"Playful back-and-forth conversation or teasing.","example":"There was a lot of banter between them — you could tell they'd worked together forever."},{"situation":"Explaining a situation in simple, casual terms","phrase":"Basically what's happening is","meaning":"A casual way to explain the core of a situation.","example":"Basically what's happening is demand has gone through the roof and supply hasn't kept up."},{"situation":"When someone is charged with or blamed for something","phrase":"Be accused of","meaning":"To be charged with or blamed for something.","example":"The last thing we want is to be accused of greenwashing — every claim needs to be airtight."},{"situation":"Expressing capability or opportunity","phrase":"Be able to","meaning":"To have the capability or opportunity to do something.","example":"We want to be able to move fast without sacrificing quality."},{"situation":"Emphasizing that something is genuinely true for you","phrase":"Because I do","meaning":"Stressing that something is sincerely true for the speaker.","example":"I genuinely care about this project — because I do. It's not just a job."},{"situation":"Flagging something important before getting into detail","phrase":"Before going into details, it's worth pointing out that","meaning":"Drawing attention to something key before diving deeper.","example":"Before going into details, it's worth pointing out that the market has shifted significantly."},{"situation":"Describing the experience of being publicly visible online","phrase":"Being a public figure on the internet","meaning":"Referring to the challenges of online public visibility.","example":"Being a public figure on the internet means every word you say gets scrutinized."},{"situation":"Introducing something surprising","phrase":"Believe it or not","meaning":"Used to flag that something is unexpected or hard to believe.","example":"Believe it or not, the cheapest option ended up being the most effective."},{"situation":"Not being fully honest about something","phrase":"Bending the truth","meaning":"Exaggerating or misleading without outright lying.","example":"I think he was bending the truth a little in that interview — the numbers don't add up."},{"situation":"Linking two ideas or closing a gap","phrase":"Bridge the gap / connect the dots / build the bridge","meaning":"To link two things or resolve a disconnect.","example":"Our job is to bridge the gap between what the data says and what the creative feels."},{"situation":"Grouping things into categories","phrase":"Bucket","meaning":"A category or group","example":"Let's sort all these ideas into two buckets — quick wins and bigger bets."},{"situation":"Talking about enhancing creativity","phrase":"Bump up one's creativity","meaning":"To boost or enhance creative thinking.","example":"Changing your environment can really bump up your creativity when you're stuck."},{"situation":"Asserting a personal view after acknowledging another side","phrase":"But I do think that","meaning":"Used to push back gently and assert your own perspective.","example":"I hear you, but I do think that the brief needs a full rework."},{"situation":"Highlighting a positive or redeeming quality","phrase":"But the beautiful thing about it is","meaning":"Pointing out what's good or exciting about something.","example":"But the beautiful thing about it is how simple the core idea actually is."},{"situation":"Getting to the main point after context","phrase":"But the point is","meaning":"Cutting to the core idea","example":"I know it's complicated. But the point is, we need to make a call by end of day."},{"situation":"Reminding the team to stay humble after success","phrase":"But we gotta be humble","meaning":"We need to remain modest and open-minded.","example":"We've had a great run, but we gotta be humble about what we don't know."},{"situation":"Introducing a personal preference or approach","phrase":"But what I love to do is","meaning":"Sharing what you personally like to do in a given situation.","example":"But what I love to do is start from the consumer's perspective and work backwards."},{"situation":"Requesting a brief pause or focused discussion","phrase":"Can we… for a minute?","meaning":"Asking to pause and focus on something specific.","example":"Can we talk about the timeline for a minute? I don't think it's realistic."},{"situation":"Asking someone to elaborate","phrase":"Can you talk a little bit more about…?","meaning":"Asking someone to go deeper on a topic.","example":"Can you talk a little bit more about how you landed on that budget number?"},{"situation":"Describing where an idea or outcome came from","phrase":"Came out of","meaning":"Resulted from or originated from something.","example":"This whole campaign idea came out of a random conversation over lunch."},{"situation":"Questioning or pushing back against accepted norms","phrase":"Challenge those norms","meaning":"To push back against established or accepted standards.","example":"If we want to break through, we have to challenge those norms."},{"situation":"Describing something slightly bold or irreverent","phrase":"Che It was pretty nervy of him to ask for a raise after being late every day."},{"word":"stingy  (STIN-jee)","meaning":"Unwilling to spend money or share things; extremely mean with money.","example":"He never tips. Like, ever. So stingy."},{"word":"wimpy  (WIM-pee)","meaning":"Weak and lacking in courage or determination; spineless.","example":"Don't be wimpy about it — just tell her how you feel."},{"word":"jumpy  (JUM-pee)","meaning":"Anxious and easily startled; on edge and nervous.","example":"The loud music kept making her jumpy all night."},{"word":"antsy  (ANT-see)","meaning":"Restless and unable to stay still; impatient and fidgety.","example":"I've been sitting in this waiting room for an hour. I'm getting antsy."},{"word":"whiny  (WHY-nee)","meaning":"Complaining in a feeble or irritating way; always grumbling without doing anything about it.","example":"He was so whiny about the food. Just eat it or don't."},{"word":"pompous  (POM-pus)","meaning":"Behaving as if you are more important or knowledgeable than you really are; self-important and arrogant.","example":"He gave this whole pompous speech about wine like he's some kind of expert."},{"word":"intrusive  (in-TROO-siv)","meaning":"Entering a situation where you're not wanted; violating someone's personal space or privacy.","example":"The questions got really intrusive — like, why do you need to know that?"},{"word":"empathetic  (em-puh-THET-ik)","meaning":"Able to understand and share the feelings of another person; genuinely caring about others' emotions.","example":"She's so empathetic — she always knows exactly what to say when you're going through something."},{"word":"domesticated  (duh-MES-tih-kay-ted)","meaning":"Comfortable with and good at home life — cooking, cleaning, taking care of things around the house.","example":"He's surprisingly domesticated — makes dinner every night and keeps the place spotless."},{"word":"heretical  (heh-RET-ih-kul)","meaning":"Going against widely accepted beliefs or norms; seen as shocking or unacceptable to the mainstream.","example":"I know it's heretical, but I actually think the sequel is better than the original."},{"word":"passive-aggressive  (PAS-iv uh-GRES-iv)","meaning":"Expressing hostility or resentment indirectly rather than openly; sulking or giving the silent treatment instead of speaking up.","example":"He didn't say anything but just slammed every door. So passive-aggressive."},{"word":"condescending  (kon-deh-SEN-ding)","meaning":"Talking down to people as if they're less intelligent or capable than you; patronizing.","example":"The way she explained it was so condescending — like we were five years old."},{"word":"self-righteous  (SELF-RY-chus)","meaning":"Convinced you are morally superior to others; sanctimonious and preachy about your own virtue.","example":"I agree with what he's saying but he's so self-righteous about it."},{"word":"overbearing  (oh-ver-BAIR-ing)","meaning":"Domineering and impossible to ignore; trying to control everyone around you.","example":"Her mom is so overbearing — she calls like three times a day."},{"word":"high-strung  (HY-strung)","meaning":"Very nervous and easily stressed; wound up too tight emotionally.","example":"She's a little high-strung — just give her a heads-up before any changes."},{"word":"catty  (KAT-ee)","meaning":"Making subtle, mean-spirited comments about others; bitchy in a sneaky way.","example":"The comments in that group chat were getting really catty."},{"word":"upbeat  (UP-beet)","meaning":"Positive and cheerful; having an optimistic, energetic attitude.","example":"She was surprisingly upbeat given everything she's dealing with."},{"word":"cheerful  (CHEER-ful)","meaning":"Noticeably happy and in good spirits; radiating warmth and positivity.","example":"He's always cheerful at work, even on Monday mornings."},{"word":"jolly  (JAH-lee)","meaning":"Full of high spirits and fun; jovially happy — think Santa Claus energy.","example":"Everyone was jolly by the end of the night. Good party."},{"word":"chipper  (CHIP-er)","meaning":"Lively and cheerful in an energetic way; perkily upbeat.","example":"You're very chipper this morning — did something good happen?"},{"word":"giddy  (GID-ee)","meaning":"Excitedly happy to the point of feeling light-headed; giggly and elated.","example":"She was giddy all day after he texted her back."},{"word":"droopy  (DROO-pee)","meaning":"Hanging or falling downward in a tired or sad way; lacking energy or brightness.","example":"He walked in looking all droopy — clearly did not sleep last night."},{"word":"tipsy  (TIP-see)","meaning":"Slightly drunk; feeling the pleasant early effects of alcohol without being wasted.","example":"Two glasses in and I'm already tipsy. I'm such a lightweight."},{"word":"buzzed  (BUZZD)","meaning":"Pleasantly affected by alcohol; a step past tipsy but still functional.","example":"I'm not drunk, just buzzed. Big difference."},{"word":"hammered  (HAM-erd)","meaning":"Very drunk; well past the point of being in control.","example":"He was absolutely hammered by 9pm. It was embarrassing."},{"word":"wasted  (WAY-sted)","meaning":"Extremely drunk; completely out of it from alcohol.","example":"I don't remember anything after midnight — I was wasted."},{"word":"crispy  (KRIS-pee)","meaning":"Pleasantly firm and crunchy on the outside, especially when fried or baked well.","example":"The skin on that chicken was perfectly crispy. So good."},{"word":"crunchy  (KRUN-chee)","meaning":"Making a loud crunching sound when bitten; firm enough to crunch.","example":"I like my peanut butter crunchy, not smooth."},{"word":"gooey  (GOO-ee)","meaning":"Soft, sticky, and wet in a pleasantly indulgent way — think melted cheese or brownie centers.","example":"That brownie was so gooey in the middle. Insane."},{"word":"chewy  (CHOO-ee)","meaning":"Needing a lot of chewing; not tender. Can be positive (bagel) or negative (tough steak).","example":"These cookies are chewy and soft — exactly how I like them."},{"word":"soggy  (SAW-gee)","meaning":"Soft and wet from soaking up too much liquid; unpleasantly waterlogged.","example":"I hate soggy fries. Just ruin the whole meal."},{"word":"mushy  (MUSH-ee)","meaning":"Soft and pulpy to the point of being unpleasant; overcooked or over-ripe.","example":"The pasta was way overcooked — totally mushy."},{"word":"greasy  (GREE-see)","meaning":"Covered in or having too much oil or fat; unpleasantly oily.","example":"I love greasy diner food when I'm hungover."},{"word":"salty  (SAWL-tee)","meaning":"Tasting of salt. In slang: bitter, resentful, or annoyed about something.","example":"He's still salty about losing the game last week."},{"word":"spicy  (SPY-see)","meaning":"Having a strong, hot flavor from chili or spices. Also informally: edgy or provocative.","example":"That tweet was spicy. She's not holding back."},{"word":"zesty  (ZES-tee)","meaning":"Having a sharp, refreshing flavor, often from citrus. Also: energetic and lively.","example":"This lemon dressing is so zesty — I need the recipe."},{"word":"tangy  (TANG-ee)","meaning":"Having a strong, sharp, slightly sour taste that tingles the tongue.","example":"The sauce is a little tangy — kind of like a vinegar BBQ thing."},{"word":"fishy  (FISH-ee)","meaning":"Smelling or tasting of fish. In everyday use: suspicious or dishonest.","example":"His story doesn't add up. Something smells fishy."},{"word":"nutty  (NUT-ee)","meaning":"Tasting or smelling of nuts. Informally: slightly crazy or eccentric.","example":"This cheese has a really nutty flavor — in a good way."},{"word":"buttery  (BUT-er-ee)","meaning":"Tasting rich and smooth like butter; also used for a very smooth texture.","example":"The chardonnay was super buttery. A bit too much for me."},{"word":"boozy  (BOO-zee)","meaning":"Containing a lot of alcohol; tasting strongly of alcohol. Also describes a heavy drinker.","example":"These cocktails are really boozy — only have one if you're driving."},{"word":"fragrant  (FRAY-grunt)","meaning":"Having a pleasant, sweet smell; aromatic and inviting to the nose.","example":"The bread just came out of the oven and it's so fragrant in here."},{"word":"soft and tender  (SAWFT and TEN-der)","meaning":"Yielding easily to touch; cooked or prepared so that it melts in the mouth.","example":"The short rib was fall-apart soft and tender. Cooked it for six hours."},{"word":"raspy  (RAS-pee)","meaning":"Having a rough, scratchy quality — usually describing a voice.","example":"She had this really raspy voice, like she'd been singing all night. Super cool actually."},{"word":"muggy  (MUG-ee)","meaning":"Unpleasantly warm and humid; the kind of weather that makes you sweat just standing still.","example":"Tokyo in August is so muggy. I can't handle it."},{"word":"chilly  (CHIL-ee)","meaning":"Noticeably cold but not freezing; cool enough to make you want a jacket.","example":"It's a bit chilly out — maybe grab a jacket."},{"word":"breezy  (BREE-zee)","meaning":"Pleasantly windy. Also describes someone who is casual and relaxed.","example":"It's breezy out but sunny — perfect for a walk."},{"word":"foggy  (FAW-gee)","meaning":"Full of fog and hard to see through. Also: mentally unclear.","example":"Sorry, I'm still a bit foggy — I just woke up."},{"word":"dusty  (DUS-tee)","meaning":"Covered with a layer of dust; not used or cleaned in a long time.","example":"This room is so dusty. When did we last open it?"},{"word":"rusty  (RUS-tee)","meaning":"Covered in rust. Figuratively: out of practice and not as sharp as you used to be.","example":"My French is a bit rusty — I haven't spoken it in years."},{"word":"musty  (MUS-tee)","meaning":"Having a stale, damp smell from being closed up for too long; smelling old.","example":"The cabin smelled kind of musty, but it was fine once we opened the windows."},{"word":"stuffy  (STUF-ee)","meaning":"Lacking fresh air. Also describes someone who is overly formal and conservative r bones are visible; very skinny.","example":"You can tell she hasn't been eating well — she looks bony."},{"word":"scruffy  (SKRUF-ee)","meaning":"Untidy and slightly dirty in appearance; messy-looking.","example":"He showed up to the interview looking all scruffy. Not a good look."},{"word":"sloppy  (SLAH-pee)","meaning":"Careless and untidy; lacking attention to detail or effort.","example":"The report was really sloppy — typos everywhere. Send it back."},{"word":"frumpy  (FRUM-pee)","meaning":"Dressed in clothes that are dull and unfashionable; dowdy.","example":"That outfit makes her look frumpy — she can do so much better."},{"word":"fancy  (FAN-see)","meaning":"Elaborate and expensive-looking; more decorative or upscale than usual.","example":"Oh, we're getting fancy tonight — are you buying?"},{"word":"gaudy  (GAW-dee)","meaning":"Extravagantly bright or showy in a way that is tasteless or vulgar.","example":"The decorations were so gaudy — like, rhinestones everywhere."},{"word":"tacky  (TAK-ee)","meaning":"Showing poor taste; cheap and vulgar-looking.","example":"Charging guests a cover fee at your own birthday party is so tacky."},{"word":"shabby  (SHAB-ee)","meaning":"In a poor condition from age or overuse; worn out and neglected-looking.","example":"The hotel looked nice in photos but it was pretty shabby in person."},{"word":"snazzy  (SNAZ-ee)","meaning":"Stylish and attractive in a flashy way; looking impressively neat or sharp.","example":"Nice jacket — very snazzy."},{"word":"classy  (KLAS-ee)","meaning":"Stylish and sophisticated; showing high quality and good taste.","example":"She handled the whole situation really classy. Impressed."},{"word":"beefy  (BEE-fee)","meaning":"Large, solid, and muscular; impressively substantial in size or build.","example":"That was a beefy book — 600 pages. But worth it."},{"word":"pricey  (PRY-see)","meaning":"More expensive than expected or desired; on the costly side.","example":"The food was great but a little ever and funny, especially in a quick, sharp way.","example":"His captions are so witty — every single one."},{"word":"nerdy  (NER-dee)","meaning":"Enthusiastically interested in academic or technical subjects in a way seen as socially awkward.","example":"I know this is nerdy, but I actually read the whole manual."},{"word":"dorky  (DOR-kee)","meaning":"Socially awkward and unfashionable but in an endearing, harmless way.","example":"He's a little dorky but that's kind of why I like him."},{"word":"goofy  (GOO-fee)","meaning":"Silly and harmlessly stupid in a lovable way; playfully absurd.","example":"He made this whole goofy dance to celebrate. So him."},{"word":"quirky  (KWER-kee)","meaning":"Having unusual and interesting traits; charmingly unconventional.","example":"Her style is quirky but she totally pulls it off."},{"word":"preachy  (PREE-chee)","meaning":"Giving moral lectures in an irritating, self-righteous way.","example":"I agree with his point but he gets so preachy about it."},{"word":"fussy  (FUS-ee)","meaning":"Hard to please; overly particular about details.","example":"He's so fussy about coffee — it has to be exactly 65 degrees."},{"word":"snappy  (SNAP-ee)","meaning":"Quick and efficient; also stylish. Can also mean irritably sharp in speech.","example":"Love the new logo — clean and snappy."},{"word":"savvy  (SAV-ee)","meaning":"Having practical knowledge and good judgment in a particular area.","example":"She's really media-savvy. Knows exactly what gets engagement."},{"word":"punchy  (PUN-chee)","meaning":"Short, direct, and full of impact; effective because of its brevity and energy.","example":"The tagline is punchy — it sticks with you."},{"word":"superficial  (soo-per-FISH-ul)","meaning":"Only concerned with surface appearances; lacking depth or genuine understanding.","example":"The conversation was pretty superficial — nobody said anything real."},{"word":"conventional  (kun-VEN-shun-ul)","meaning":"Following what is traditionally done; is album right now."},{"word":"extra  (EK-struh)","meaning":"Over the top; doing way too much for the situation.","example":"She showed up in a ballgown to a casual dinner. So extra."},{"word":"basic  (BAY-sik)","meaning":"Unoriginal and predictable in taste; following mainstream trends without any individual style.","example":"Pumpkin spice latte? That's so basic.\" (Note: often said affectionately)"},{"word":"mid  (MID)","meaning":"Mediocre; neither good nor bad — just disappointingly average.","example":"The movie was mid. I wouldn't watch it again but it wasn't terrible."},{"word":"sus  (SUSS)","meaning":"Suspicious; something feels off or not trustworthy. Short for 'suspicious.'","example":"The way he keeps changing the story is really sus."},{"word":"shook  (SHOOK)","meaning":"Deeply shaken or shocked; emotionally rattled by something unexpected.","example":"I'm still shook — did not see that ending coming."},{"word":"pressed  (PRESST)","meaning":"Visibly bothered or upset about something; trying too hard to seem unbothered but failing.","example":"Why is he so pressed about a comment? Let it go."},{"word":"burnt out  (BURNT OWT)","meaning":"Completely exhausted and drained from prolonged stress or overwork; past the point of tired.","example":"I'm so burnt out. I haven't had a day off in three weeks."},{"word":"down  (DOWN)","meaning":"Willing and ready; on board with something. Short for 'I'm down for it.'","example":"Tacos tonight? I'm down."}]

// ── State ──
let activeDeckId  = null;
let deck_cfg      = null;
let phrases       = [];
let deck          = [];
let learned       = [];
let saved         = new Set(); // indices of saved cards for this deck
let current       = 0;
let stage         = 0;
let busy          = false;
let savedReview   = false;    // true when reviewing saved cards only

// ── Home ──
document.getElementById('deck-takaki').addEventListener('click', () => startDeck('takaki'));
document.getElementById('deck-slang').addEventListener('click',  () => startDeck('slang'));
document.getElementById('deck-drama').addEventListener('click',  () => startDeck('drama'));
document.getElementById('deck-judy').addEventListener('click',   () => startDeck('judy'));
document.getElementById('deck-adj').addEventListener('click',    () => startDeck('adj'));

function startDeck(id) {
  activeDeckId = id;
  deck_cfg  = DECKS[id];
  phrases   = deck_cfg.phrases;

  // Style progress bar
  const fill = document.getElementById('progress-fill');
  fill.className = 'progress-fill fill-' + deck_cfg.color;

  // Load saved set
  const rawSaved = localStorage.getItem('pc_saved_' + id);
  saved = rawSaved ? new Set(JSON.parse(rawSaved)) : new Set();
  savedReview = false;

  const raw = localStorage.getItem('pc_session_' + id);
  if (raw) {
    try {
      const s = JSON.parse(raw);
      if (s.total === phrases.length) {
        deck = s.deck; learned = s.learned;
        if (deck.length === 0) { showComplete(); return; }
        current = 0; stage = 0;
        showScreen('study'); renderCard(); return;
      }
    } catch {}
  }
  startFresh();
}

function startFresh() {
  deck    = shuffle(phrases.map((_, i) => i));
  learned = []; current = 0; stage = 0;
  saveSession();
  showScreen('study');
  renderCard();
}

function saveSession() {
  localStorage.setItem('pc_session_' + activeDeckId,
    JSON.stringify({ deck, learned, total: phrases.length }));
}

function persistSaved() {
  localStorage.setItem('pc_saved_' + activeDeckId, JSON.stringify([...saved]));
}

// ── Dots ──
function buildDots() {
  const container = document.getElementById('stage-dots');
  container.innerHTML = '';
  for (let i = 0; i < deck_cfg.stages; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = 'dot-' + i;
    container.appendChild(d);
  }
}

function updateDots() {
  for (let i = 0; i < deck_cfg.stages; i++) {
    const d = document.getElementById('dot-' + i);
    if (d) d.className = 'dot' + (i <= stage ? ' active-' + deck_cfg.color : '');
  }
}

// ── Render ──
function renderCard() {
  stage = 0;
  buildDots();
  updateDots();
  updateProgress();
  updateSaveBtn();

  const p    = phrases[deck[current]];
  const hint = document.getElementById('tap-hint');
  const col  = deck_cfg.color;

  if (deck_cfg.type === 'adj') {
    // Meaning first
    document.getElementById('card-content').innerHTML =
      '<div class="card-label label-' + col + '">Meaning</div>' +
      '<div class="card-situation">' + esc(p.meaning) + '</div>';
    hint.textContent = 'tap to reveal word';
  } else if (deck_cfg.stages === 3) {
    // Situation only
    document.getElementById('card-content').innerHTML =
      '<div class="card-label label-' + col + '">Situation</div>' +
      '<div class="card-situation">' + esc(p.situation) + '</div>';
    hint.textContent = 'tap to reveal phrase';
  } else {
    // Phrase only
    document.getElementById('card-content').innerHTML =
      '<div class="card-label label-' + col + '">Phrase</div>' +
      '<div class="card-phrase">' + esc(p.phrase) + '</div>';
    hint.textContent = 'tap to reveal meaning';
  }
  hint.style.display = '';
}

function revealNext() {
  const p   = phrases[deck[current]];
  const col = deck_cfg.color;
  const hint = document.getElementById('tap-hint');

  if (deck_cfg.type === 'adj') {
    if (stage === 0) {
      stage = 1;
      document.getElementById('card-content').innerHTML =
        '<div class="card-label label-' + col + '">Meaning</div>' +
        '<div class="card-situation">' + esc(p.meaning) + '</div>' +
        '<div class="card-divider"></div>' +
        '<div class="card-phrase">' + esc(p.word) + '</div>';
      hint.textContent = 'tap to reveal example';
    } else if (stage === 1) {
      stage = 2;
      document.getElementById('card-content').innerHTML =
        '<div class="card-label label-' + col + '">Meaning</div>' +
        '<div class="card-situation">' + esc(p.meaning) + '</div>' +
        '<div class="card-divider"></div>' +
        '<div class="card-phrase">' + esc(p.word) + '</div>' +
        (p.example ? '<div class="card-divider"></div><div class="card-meaning">"' + esc(p.example) + '"</div>' : '');
      hint.style.display = 'none';
    }
  } else if (deck_cfg.stages === 3) {
    if (stage === 0) {
      stage = 1;
      document.getElementById('card-content').innerHTML =
        '<div class="card-label label-' + col + '">Situation</div>' +
        '<div class="card-situation">' + esc(p.situation) + '</div>' +
        '<div class="card-divider"></div>' +
        '<div class="card-phrase">' + esc(p.phrase) + '</div>';
      hint.textContent = 'tap to reveal meaning';
    } else if (stage === 1) {
      stage = 2;
      document.getElementById('card-content').innerHTML =
        '<div class="card-label label-' + col + '">Situation</div>' +
        '<div class="card-situation">' + esc(p.situation) + '</div>' +
        '<div class="card-divider"></div>' +
        '<div class="card-phrase">' + esc(p.phrase) + '</div>' +
        '<div class="card-divider"></div>' +
        '<div class="card-meaning">' + esc(p.meaning) + '</div>' +
        (p.example ? '<div class="card-example">“' + esc(p.example) + '”</div>' : '');
      hint.style.display = 'none';
    }
  } else {
    if (stage === 0) {
      stage = 1;
      document.getElementById('card-content').innerHTML =
        '<div class="card-label label-' + col + '">Phrase</div>' +
        '<div class="card-phrase">' + esc(p.phrase) + '</div>' +
        '<div class="card-divider"></div>' +
        '<div class="card-meaning">' + esc(p.meaning) + '</div>';
      hint.style.display = 'none';
    }
  }
  updateDots();
}

document.getElementById('card').addEventListener('click', () => {
  if (busy || stage >= deck_cfg.stages - 1) return;
  revealNext();
});

function updateSaveBtn() {
  const idx = deck[current];
  const btn = document.getElementById('btn-save');
  const isSaved = saved.has(idx);
  btn.classList.toggle('saved', isSaved);
  btn.querySelector('.btn-icon').textContent = isSaved ? '🔖' : '🔖';
  btn.querySelector('.btn-text').textContent  = isSaved ? 'Saved' : 'Save';
}

function toggleSave() {
  const idx = deck[current];
  if (saved.has(idx)) saved.delete(idx);
  else saved.add(idx);
  persistSaved();
  updateSaveBtn();
  // brief pulse animation
  const btn = document.getElementById('btn-save');
  btn.style.transform = 'scale(0.93)';
  setTimeout(() => { btn.style.transform = ''; }, 120);
}

function updateProgress() {
  const total = deck.length + learned.length;
  const done  = learned.length;
  document.getElementById('count-pill').textContent = done + ' / ' + total;
  document.getElementById('progress-fill').style.width =
    (total > 0 ? (done / total * 100) : 0) + '%';
}

// ── Advance ──
function advance(dir) {
  if (busy) return;
  busy = true;
  const card = document.getElementById('card');
  card.classList.add(dir === 'right' ? 'fly-right' : 'fly-left');

  setTimeout(() => {
    card.classList.remove('fly-right', 'fly-left');
    if (dir === 'right') {
      const idx = deck.splice(current, 1)[0];
      learned.push(idx);
      // In saved review: Got it = unsave
      if (savedReview) { saved.delete(idx); persistSaved(); }
    } else {
      const removed = deck.splice(current, 1)[0];
      const lo = current + 1, hi = deck.length;
      const pos = lo + Math.floor(Math.random() * Math.max(hi - lo + 1, 1));
      deck.splice(Math.min(pos, deck.length), 0, removed);
    }
    if (current >= deck.length && deck.length > 0) current = 0;
    if (!savedReview) saveSession();
    if (deck.length === 0) { showComplete(); busy = false; return; }
    renderCard();
    card.classList.add('pop-in');
    setTimeout(() => { card.classList.remove('pop-in'); busy = false; }, 220);
  }, 280);
}

document.getElementById('btn-got').addEventListener('click',   () => advance('right'));
document.getElementById('btn-again').addEventListener('click', () => advance('left'));
document.getElementById('btn-save').addEventListener('click',  () => toggleSave());

// ── Swipe ──
let touchX0 = 0, touchY0 = 0, dragging = false;
const cardEl = document.getElementById('card');
const labelGot = document.getElementById('label-got');
const labelAgain = document.getElementById('label-again');

cardEl.addEventListener('touchstart', e => {
  if (busy) return;
  touchX0 = e.touches[0].clientX; touchY0 = e.touches[0].clientY;
  dragging = false; cardEl.classList.add('no-transition');
}, { passive: true });

cardEl.addEventListener('touchmove', e => {
  if (busy) return;
  const dx = e.touches[0].clientX - touchX0;
  const dy = e.touches[0].clientY - touchY0;
  if (!dragging && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) dragging = true;
  if (!dragging) return;
  cardEl.style.transform = 'translateX(' + dx + 'px) rotate(' + (dx * 0.06) + 'deg)';
  const t = Math.min(Math.abs(dx) / 90, 1);
  labelGot.style.opacity   = dx >  15 ? t : 0;
  labelAgain.style.opacity = dx < -15 ? t : 0;
}, { passive: true });

cardEl.addEventListener('touchend', e => {
  cardEl.classList.remove('no-transition');
  labelGot.style.opacity = labelAgain.style.opacity = 0;
  if (!dragging) { cardEl.style.transform = ''; return; }
  dragging = false;
  const dx = e.changedTouches[0].clientX - touchX0;
  e.preventDefault();
  cardEl.style.transform = '';
  if      (dx >  75) advance('right');
  else if (dx < -75) advance('left');
}, { passive: false });

// ── Menu ──
const overlay = document.getElementById('overlay');
document.getElementById('menu-btn').addEventListener('click', () => {
  document.getElementById('saved-count').textContent = saved.size;
  document.getElementById('menu-saved').disabled = saved.size === 0;
  document.getElementById('menu-saved').style.opacity = saved.size === 0 ? '0.4' : '1';
  overlay.classList.remove('hidden');
});
document.getElementById('menu-cancel').addEventListener('click', () => overlay.classList.add('hidden'));
overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.add('hidden'); });
document.getElementById('menu-shuffle').addEventListener('click', () => {
  overlay.classList.add('hidden');
  localStorage.removeItem('pc_session_' + activeDeckId);
  savedReview = false;
  startFresh();
});

document.getElementById('menu-saved').addEventListener('click', () => {
  overlay.classList.add('hidden');
  if (saved.size === 0) return;
  savedReview = true;
  deck    = shuffle([...saved]);
  learned = [];
  current = 0; stage = 0;
  showScreen('study');
  renderCard();
});
document.getElementById('home-btn').addEventListener('click', () => showScreen('home'));

// ── Complete ──
function showComplete() {
  document.getElementById('stat-total').textContent = phrases.length;
  document.getElementById('stat-got').textContent   = learned.length;
  document.getElementById('complete-desc').textContent =
    'You reviewed all ' + phrases.length + ' phrases.';
  showScreen('complete');
}
document.getElementById('btn-restart').addEventListener('click', () => {
  localStorage.removeItem('pc_session_' + activeDeckId);
  savedReview = false;
  startFresh();
});
document.getElementById('btn-back-home').addEventListener('click', () => showScreen('home'));

// ── Utils ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function showScreen(name) {
  ['home','study','complete'].forEach(s => {
    document.getElementById(s+'-screen').classList.toggle('hidden', s !== name);
  });
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
