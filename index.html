<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Phrase Cards">
  <meta name="theme-color" content="#6366f1">
  <title>Phrase Cards</title>
  <link rel="manifest" href="manifest.json">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc; color: #1e293b;
    }

    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px 20px;
      padding-top: max(env(safe-area-inset-top, 0px), 24px);
      padding-bottom: max(env(safe-area-inset-bottom, 0px), 24px);
    }
    .screen.hidden { display: none; }

    /* ── Home ── */
    .home-logo  { font-size: 48px; margin-bottom: 12px; }
    .home-title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
    .home-sub   { font-size: 15px; color: #64748b; margin-bottom: 48px; }

    .deck-grid { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 14px; }
    .deck-card {
      width: 100%; padding: 24px 22px; border: none; border-radius: 20px;
      cursor: pointer; text-align: left; display: flex; align-items: center; gap: 16px;
      transition: transform .12s, box-shadow .12s;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 2px 16px rgba(0,0,0,.07);
    }
    .deck-card:active { transform: scale(.97); }
    .deck-card.indigo { background: #6366f1; color: white; }
    .deck-card.orange { background: #f97316; color: white; }
    .deck-card.rose   { background: #e11d48; color: white; }
    .deck-card.teal   { background: #0d9488; color: white; }
    .deck-icon { font-size: 32px; flex-shrink: 0; }
    .deck-info { flex: 1; }
    .deck-name  { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
    .deck-count { font-size: 13px; opacity: .75; }

    /* ── Study ── */
    .study-inner {
      width: 100%; max-width: 420px;
      display: flex; flex-direction: column; align-items: center;
    }
    .top-bar {
      width: 100%; display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 18px;
    }
    .icon-btn {
      background: none; border: none; font-size: 22px;
      cursor: pointer; padding: 6px; line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }
    .count-pill {
      font-size: 13px; font-weight: 600; color: #64748b;
      background: #f1f5f9; padding: 5px 14px; border-radius: 99px;
    }
    .progress-track {
      width: 100%; height: 5px; background: #e2e8f0;
      border-radius: 3px; margin-bottom: 22px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 3px;
      transition: width .4s cubic-bezier(.4,0,.2,1);
    }
    .fill-indigo { background: linear-gradient(90deg, #6366f1, #818cf8); }
    .fill-orange { background: linear-gradient(90deg, #f97316, #fb923c); }
    .fill-rose   { background: linear-gradient(90deg, #e11d48, #fb7185); }
    .fill-teal   { background: linear-gradient(90deg, #0d9488, #2dd4bf); }

    /* Stage dots */
    .stage-dots { display: flex; gap: 6px; margin-bottom: 20px; min-height: 19px; }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #e2e8f0; transition: background .2s;
    }
    .dot.active-indigo { background: #6366f1; }
    .dot.active-orange { background: #f97316; }
    .dot.active-rose   { background: #e11d48; }
    .dot.active-teal   { background: #0d9488; }

    /* Card */
    .card-area { width: 100%; position: relative; margin-bottom: 24px; }
    .card {
      width: 100%; min-height: 250px; background: white;
      border-radius: 24px;
      box-shadow: 0 2px 24px rgba(0,0,0,.07), 0 1px 4px rgba(0,0,0,.04);
      padding: 32px 28px; cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: pan-y; will-change: transform; user-select: none;
    }
    .card.no-transition { transition: none !important; }

    @keyframes flyRight { to { transform: translateX(130%) rotate(15deg); opacity: 0; } }
    @keyframes flyLeft  { to { transform: translateX(-130%) rotate(-15deg); opacity: 0; } }
    @keyframes popIn    { from { transform: scale(.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .card.fly-right { animation: flyRight .28s ease-in forwards; }
    .card.fly-left  { animation: flyLeft  .28s ease-in forwards; }
    .card.pop-in    { animation: popIn .22s ease-out; }

    .card-label {
      font-size: 11px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; margin-bottom: 10px;
    }
    .label-indigo { color: #6366f1; }
    .label-orange { color: #f97316; }
    .label-rose   { color: #e11d48; }
    .label-teal   { color: #0d9488; }

    .card-situation { font-size: clamp(14px, 3.8vw, 17px); color: #475569; line-height: 1.65; }
    .card-phrase    { font-size: clamp(17px, 4.5vw, 22px); font-weight: 800; line-height: 1.45; color: #0f172a; }
    .card-meaning   { font-size: 14px; color: #64748b; line-height: 1.65; }
    .card-divider   { width: 36px; height: 2px; background: #e2e8f0; border-radius: 1px; margin: 16px auto; }
    .card-tap-hint  { font-size: 12px; color: #cbd5e1; margin-top: 20px; letter-spacing: .3px; }

    /* Swipe labels */
    .swipe-label {
      position: absolute; top: 50%; transform: translateY(-50%);
      font-size: 13px; font-weight: 800; letter-spacing: .8px;
      padding: 6px 14px; border-radius: 8px;
      opacity: 0; pointer-events: none; border: 2px solid;
    }
    .swipe-label.got   { right: 10px; color: #16a34a; background: #dcfce7; border-color: #16a34a; }
    .swipe-label.again { left: 10px;  color: #dc2626; background: #fee2e2; border-color: #dc2626; }

    /* Buttons */
    .action-btns { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .action-btn {
      padding: 18px 12px; border: none; border-radius: 16px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      -webkit-tap-highlight-color: transparent; transition: transform .1s;
    }
    .action-btn:active { transform: scale(.96); }
    .btn-again { background: #fff1f2; color: #e11d48; }
    .btn-got   { background: #f0fdf4; color: #16a34a; }
    .btn-icon  { font-size: 20px; }
    .btn-text  { font-size: 13px; }

    /* ── Complete ── */
    .complete-emoji { font-size: 72px; margin-bottom: 14px; }
    .complete-title { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
    .complete-desc  { color: #64748b; font-size: 15px; margin-bottom: 36px; text-align: center; }
    .stats-row { display: flex; gap: 16px; margin-bottom: 36px; }
    .stat-box {
      text-align: center; background: white; border-radius: 16px;
      padding: 16px 28px; box-shadow: 0 1px 8px rgba(0,0,0,.06);
    }
    .stat-num   { font-size: 30px; font-weight: 800; color: #6366f1; }
    .stat-label { font-size: 12px; color: #94a3b8; margin-top: 2px; }
    .complete-actions { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 10px; }
    .btn-block {
      width: 100%; padding: 16px; border: none; border-radius: 14px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      -webkit-tap-highlight-color: transparent; transition: transform .1s;
    }
    .btn-block:active { transform: scale(.97); }
    .btn-primary   { background: #6366f1; color: white; }
    .btn-secondary { background: #f1f5f9; color: #334155; }

    /* ── Menu ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.4);
      display: flex; align-items: flex-end; justify-content: center;
      padding: 20px; z-index: 100;
    }
    .overlay.hidden { display: none; }
    .menu-sheet { background: white; border-radius: 20px; padding: 20px; width: 100%; max-width: 420px; }
    .menu-title {
      font-size: 13px; font-weight: 600; color: #94a3b8;
      margin-bottom: 12px; text-transform: uppercase; letter-spacing: .5px;
    }
    .menu-item {
      width: 100%; padding: 14px 16px; border: none; border-radius: 12px;
      background: #f8fafc; font-size: 15px; font-weight: 600; color: #1e293b;
      cursor: pointer; text-align: left; margin-bottom: 8px;
      -webkit-tap-highlight-color: transparent;
    }
    .menu-cancel {
      width: 100%; padding: 14px; border: none; border-radius: 12px;
      background: #f1f5f9; font-size: 15px; font-weight: 700; color: #64748b;
      cursor: pointer; margin-top: 8px; -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>

<!-- ══ HOME ══ -->
<div class="screen" id="home-screen">
  <div class="home-logo">📖</div>
  <div class="home-title">Phrase Cards</div>
  <div class="home-sub">Choose your deck</div>
  <div class="deck-grid">
    <button class="deck-card indigo" id="deck-takaki">
      <span class="deck-icon">⭐</span>
      <div class="deck-info">
        <div class="deck-name">Takaki Selected</div>
        <div class="deck-count">451 phrases · 3 stages</div>
      </div>
    </button>
    <button class="deck-card orange" id="deck-slang">
      <span class="deck-icon">🔥</span>
      <div class="deck-info">
        <div class="deck-name">Slang &amp; Class</div>
        <div class="deck-count">222 phrases · 2 stages</div>
      </div>
    </button>
    <button class="deck-card rose" id="deck-drama">
      <span class="deck-icon">🎭</span>
      <div class="deck-info">
        <div class="deck-name">Drama English</div>
        <div class="deck-count">26 phrases · 2 stages</div>
      </div>
    </button>
    <button class="deck-card teal" id="deck-judy">
      <span class="deck-icon">🎙️</span>
      <div class="deck-info">
        <div class="deck-name">Judy &amp; Jesse</div>
        <div class="deck-count">10 phrases · 2 stages</div>
      </div>
    </button>
  </div>
</div>

<!-- ══ STUDY ══ -->
<div class="screen hidden" id="study-screen">
  <div class="study-inner">
    <div class="top-bar">
      <button class="icon-btn" id="menu-btn">⋯</button>
      <div class="count-pill" id="count-pill">0 / 0</div>
      <button class="icon-btn" id="home-btn">⌂</button>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="stage-dots" id="stage-dots"></div>
    <div class="card-area">
      <div class="card" id="card">
        <div id="card-content"></div>
        <div class="card-tap-hint" id="tap-hint"></div>
      </div>
      <div class="swipe-label got"   id="label-got">GOT IT ✓</div>
      <div class="swipe-label again" id="label-again">AGAIN ✗</div>
    </div>
    <div class="action-btns">
      <button class="action-btn btn-again" id="btn-again">
        <span class="btn-icon">↩</span><span class="btn-text">Again</span>
      </button>
      <button class="action-btn btn-got" id="btn-got">
        <span class="btn-icon">✓</span><span class="btn-text">Got it</span>
      </button>
    </div>
  </div>
</div>

<!-- ══ COMPLETE ══ -->
<div class="screen hidden" id="complete-screen">
  <div class="complete-emoji">🎉</div>
  <div class="complete-title">Session Complete!</div>
  <div class="complete-desc" id="complete-desc"></div>
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="stat-got">0</div>
      <div class="stat-label">Got it</div>
    </div>
  </div>
  <div class="complete-actions">
    <button class="btn-block btn-primary"   id="btn-restart">Study again</button>
    <button class="btn-block btn-secondary" id="btn-back-home">Back to home</button>
  </div>
</div>

<!-- ══ MENU ══ -->
<div class="overlay hidden" id="overlay">
  <div class="menu-sheet">
    <div class="menu-title">Options</div>
    <button class="menu-item" id="menu-shuffle">🔀 Shuffle &amp; restart</button>
    <button class="menu-cancel" id="menu-cancel">Cancel</button>
  </div>
</div>

<script>
'use strict';

const DECKS = {
  takaki: {
    color: 'indigo',
    stages: 3,
    phrases: [{"situation":"When you want to add a brief point to what someone just said","phrase":"A couple of","meaning":"A few, a small number of. \"I have a couple of questions.\""},{"situation":"When validating that something many people experience is real","phrase":"A lot of people… That's a real thing.","meaning":"Used to confirm that something is a common, genuine experience."},{"situation":"Referring to a single unit of media or content","phrase":"A piece of content","meaning":"One item of media — an article, video, or post."},{"situation":"When crediting a completed creative or professional output","phrase":"A piece of work","meaning":"A finished creative or professional output."},{"situation":"Describing a large quantity of something","phrase":"A ton of / a bunch of","meaning":"A large amount of something. \"We have a ton of feedback.\""},{"situation":"Shifting from a joke to a sincere point","phrase":"All seriousness / In all seriousness","meaning":"Used to signal you're being genuinely serious now."},{"situation":"Describing something that covers everything from start to finish","phrase":"All the way through","meaning":"Completely, from beginning to end."},{"situation":"Referring collectively to several things just mentioned","phrase":"All these things","meaning":"Everything mentioned so far. \"All these things add up over time.\""},{"situation":"Describing what something makes possible","phrase":"Allow us to do","meaning":"Enables or gives us the ability to do something."},{"situation":"Introducing a contrasting point after acknowledging something","phrase":"Although","meaning":"Despite the fact that; even though."},{"situation":"Describing something that has always had a consistent focus","phrase":"Always has been centered","meaning":"Has consistently focused on something."},{"situation":"Referencing a colleague's point to introduce a change","phrase":"And so, like [name] mentioned, we're really doing things a little bit differently this year.","meaning":"Building on a colleague's point to introduce a new direction."},{"situation":"Casual transition to describe a reaction or next step","phrase":"And then you have to be like","meaning":"Informal way to describe how you or someone responded."},{"situation":"Introducing a new, noteworthy point","phrase":"Another interesting thing is that","meaning":"Used to add a new notable point to the conversation."},{"situation":"Asking for practical advice","phrase":"Any tips on…?","meaning":"Asking for suggestions or advice on something."},{"situation":"Expressing doubt or asking someone to confirm","phrase":"Are you sure about that?","meaning":"Seeking confirmation; expressing mild disbelief."},{"situation":"Considering everything together","phrase":"As a whole","meaning":"Overall; taking everything into account."},{"situation":"Stating the limit of your knowledge","phrase":"As far as I know","meaning":"To the best of my knowledge."},{"situation":"Stating a condition for something to work","phrase":"As long as","meaning":"Provided that; on the condition that."},{"situation":"Describing growth or increasing complexity in your life","phrase":"As my life is growing…","meaning":"As my circumstances expand or develop."},{"situation":"Referring back to something already discussed","phrase":"As previously mentioned","meaning":"Referring to something said earlier. (More polite than \"as I told you.\")"},{"situation":"Signaling that something should be obvious to the listener","phrase":"As you can tell","meaning":"As is apparent or obvious."},{"situation":"Connecting to what someone is currently discussing","phrase":"As you talk about","meaning":"In relation to what you're saying right now."},{"situation":"Taking someone's agreement for granted before moving on","phrase":"Assuming that [name] is okay","meaning":"Taking for granted that someone agrees or is comfortable."},{"situation":"Introducing a contrasting point","phrase":"At the same time though","meaning":"However; on the other hand."},{"situation":"Referring to something from the past","phrase":"Back in the day","meaning":"In the past; in earlier times."},{"situation":"Correcting an unfair negative perception of something","phrase":"Bad rap","meaning":"An unfair or undeserved negative reputation."},{"situation":"Describing two things that offset each other","phrase":"Balance each other out","meaning":"To complement or offset one another."},{"situation":"Light, playful conversation or teasing","phrase":"Banter","meaning":"Playful back-and-forth conversation or teasing."},{"situation":"Explaining a situation in simple, casual terms","phrase":"Basically what's happening is","meaning":"A casual way to explain the core of a situation."},{"situation":"When someone is charged with or blamed for something","phrase":"Be accused of","meaning":"To be charged with or blamed for something."},{"situation":"Expressing capability or opportunity","phrase":"Be able to","meaning":"To have the capability or opportunity to do something."},{"situation":"Emphasizing that something is genuinely true for you","phrase":"Because I do","meaning":"Stressing that something is sincerely true for the speaker."},{"situation":"Flagging something important before getting into detail","phrase":"Before going into details, it's worth pointing out that","meaning":"Drawing attention to something key before diving deeper."},{"situation":"Describing the experience of being publicly visible online","phrase":"Being a public figure on the internet","meaning":"Referring to the challenges of online public visibility."},{"situation":"Introducing something surprising","phrase":"Believe it or not","meaning":"Used to flag that something is unexpected or hard to believe."},{"situation":"Not being fully honest about something","phrase":"Bending the truth","meaning":"Exaggerating or misleading without outright lying."},{"situation":"Linking two ideas or closing a gap","phrase":"Bridge the gap / connect the dots / build the bridge","meaning":"To link two things or resolve a disconnect."},{"situation":"Grouping things into categories","phrase":"Bucket","meaning":"A category or group. \"Let's sort these into two buckets.\""},{"situation":"Talking about enhancing creativity","phrase":"Bump up one's creativity","meaning":"To boost or enhance creative thinking."},{"situation":"Asserting a personal view after acknowledging another side","phrase":"But I do think that","meaning":"Used to push back gently and assert your own perspective."},{"situation":"Highlighting a positive or redeeming quality","phrase":"But the beautiful thing about it is","meaning":"Pointing out what's good or exciting about something."},{"situation":"Getting to the main point after context","phrase":"But the point is","meaning":"Cutting to the core idea. \"But the point is, we need to decide.\""},{"situation":"Reminding the team to stay humble after success","phrase":"But we gotta be humble","meaning":"We need to remain modest and open-minded."},{"situation":"Introducing a personal preference or approach","phrase":"But what I love to do is","meaning":"Sharing what you personally like to do in a given situation."},{"situation":"Requesting a brief pause or focused discussion","phrase":"Can we… for a minute?","meaning":"Asking to pause and focus on something specific."},{"situation":"Asking someone to elaborate","phrase":"Can you talk a little bit more about…?","meaning":"Asking someone to go deeper on a topic."},{"situation":"Describing where an idea or outcome came from","phrase":"Came out of","meaning":"Resulted from or originated from something."},{"situation":"Questioning or pushing back against accepted norms","phrase":"Challenge those norms","meaning":"To push back against established or accepted standards."},{"situation":"Describing something slightly bold or irreverent","phrase":"Cheeky","meaning":"Playfully bold or slightly irreverent in tone."},{"situation":"Returning to a topic you set aside earlier","phrase":"Circle back to","meaning":"To come back to a topic later in the conversation."},{"situation":"Describing an idea or phrase that feels overused","phrase":"Cliché","meaning":"An overused expression or idea that has lost its impact."},{"situation":"Having encountered the same problem before","phrase":"Come across the exact same challenge","meaning":"To face the exact same obstacle or issue."},{"situation":"Something turning out to be useful at the right moment","phrase":"Come in handy","meaning":"To prove useful at a particular time."},{"situation":"When something starts to have an effect or become relevant","phrase":"Come into play","meaning":"To become relevant or start having an effect."},{"situation":"Identifying something shared between two things or groups","phrase":"Commonality","meaning":"A feature or characteristic shared by two or more things."},{"situation":"Gathering information from multiple sources into one place","phrase":"Compiling all the different sources","meaning":"Bringing together data or information from various places."},{"situation":"Describing something completely different from before","phrase":"Completely different from the one we had last year","meaning":"A clear contrast with a previous version or situation."},{"situation":"Keeping a positive frame of mind through challenges","phrase":"Constantly reframe it in a positive way","meaning":"To keep shifting perspective toward the constructive side."},{"situation":"Keeping something under control","phrase":"Containment","meaning":"The action of limiting or controlling something."},{"situation":"Reflecting on a missed opportunity or alternative response","phrase":"Could have been","meaning":"Expressing a past possibility that didn't happen."},{"situation":"Referring to a chance to do something creative or innovative","phrase":"Creative opportunity","meaning":"An opening to do something new or imaginative."},{"situation":"Breaking something down into its parts to understand it better","phrase":"Deconstruct the sys // ── State ──
let activeDeckId = null;
let deck_cfg  = null;
let phrases   = [];
let deck      = [];
let learned   = [];
let current   = 0;
let stage     = 0;
let busy      = false;

// ── Home ──
document.getElementById('deck-takaki').addEventListener('click', () => startDeck('takaki'));
document.getElementById('deck-slang').addEventListener('click',  () => startDeck('slang'));
document.getElementById('deck-drama').addEventListener('click',  () => startDeck('drama'));
document.getElementById('deck-judy').addEventListener('click',   () => startDeck('judy'));

function startDeck(id) {
  activeDeckId = id;
  deck_cfg  = DECKS[id];
  phrases   = deck_cfg.phrases;

  // Style progress bar
  const fill = document.getElementById('progress-fill');
  fill.className = 'progress-fill fill-' + deck_cfg.color;

  const raw = localStorage.getItem('pc_session_' + id);
  if (raw) {
    try {
      const s = JSON.parse(raw);
      if (s.total === phrases.length) {
        deck = s.deck; learned = s.learned;
        if (deck.length === 0) { showComplete(); return; }
        current = 0; stage = 0;
        showScreen('study'); renderCard(); return;
      }
    } catch {}
  }
  startFresh();
}

function startFresh() {
  deck    = shuffle(phrases.map((_, i) => i));
  learned = []; current = 0; stage = 0;
  saveSession();
  showScreen('study');
  renderCard();
}

function saveSession() {
  localStorage.setItem('pc_session_' + activeDeckId,
    JSON.stringify({ deck, learned, total: phrases.length }));
}

// ── Dots ──
function buildDots() {
  const container = document.getElementById('stage-dots');
  container.innerHTML = '';
  for (let i = 0; i < deck_cfg.stages; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = 'dot-' + i;
    container.appendChild(d);
  }
}

function updateDots() {
  for (let i = 0; i < deck_cfg.stages; i++) {
    const d = document.getElementById('dot-' + i);
    if (d) d.className = 'dot' + (i <= stage ? ' active-' + deck_cfg.color : '');
  }
}

// ── Render ──
function renderCard() {
  stage = 0;
  buildDots();
  updateDots();
  updateProgress();

  const p    = phrases[deck[current]];
  const hint = document.getElementById('tap-hint');
  const col  = deck_cfg.color;

  if (deck_cfg.stages === 3) {
    // Situation only
    document.getElementById('card-content').innerHTML =
      '<div class="card-label label-' + col + '">Situation</div>' +
      '<div class="card-situation">' + esc(p.situation) + '</div>';
    hint.textContent = 'tap to reveal phrase';
  } else {
    // Phrase only
    document.getElementById('card-content').innerHTML =
      '<div class="card-label label-' + col + '">Phrase</div>' +
      '<div class="card-phrase">' + esc(p.phrase) + '</div>';
    hint.textContent = 'tap to reveal meaning';
  }
  hint.style.display = '';
}

function revealNext() {
  const p   = phrases[deck[current]];
  const col = deck_cfg.color;
  const hint = document.getElementById('tap-hint');

  if (deck_cfg.stages === 3) {
    if (stage === 0) {
      stage = 1;
      document.getElementById('card-content').innerHTML =
        '<div class="card-label label-' + col + '">Situation</div>' +
        '<div class="card-situation">' + esc(p.situation) + '</div>' +
        '<div class="card-divider"></div>' +
        '<div class="card-phrase">' + esc(p.phrase) + '</div>';
      hint.textContent = 'tap to reveal meaning';
    } else if (stage === 1) {
      stage = 2;
      document.getElementById('card-content').innerHTML =
        '<div class="card-label label-' + col + '">Situation</div>' +
        '<div class="card-situation">' + esc(p.situation) + '</div>' +
        '<div class="card-divider"></div>' +
        '<div class="card-phrase">' + esc(p.phrase) + '</div>' +
        '<div class="card-divider"></div>' +
        '<div class="card-meaning">' + esc(p.meaning) + '</div>';
      hint.style.display = 'none';
    }
  } else {
    if (stage === 0) {
      stage = 1;
      document.getElementById('card-content').innerHTML =
        '<div class="card-label label-' + col + '">Phrase</div>' +
        '<div class="card-phrase">' + esc(p.phrase) + '</div>' +
        '<div class="card-divider"></div>' +
        '<div class="card-meaning">' + esc(p.meaning) + '</div>';
      hint.style.display = 'none';
    }
  }
  updateDots();
}

document.getElementById('card').addEventListener('click', () => {
  if (busy || stage >= deck_cfg.stages - 1) return;
  revealNext();
});

function updateProgress() {
  const total = deck.length + learned.length;
  const done  = learned.length;
  document.getElementById('count-pill').textContent = done + ' / ' + total;
  document.getElementById('progress-fill').style.width =
    (total > 0 ? (done / total * 100) : 0) + '%';
}

// ── Advance ──
function advance(dir) {
  if (busy) return;
  busy = true;
  const card = document.getElementById('card');
  card.classList.add(dir === 'right' ? 'fly-right' : 'fly-left');

  setTimeout(() => {
    card.classList.remove('fly-right', 'fly-left');
    if (dir === 'right') {
      learned.push(deck.splice(current, 1)[0]);
    } else {
      const removed = deck.splice(current, 1)[0];
      const lo = current + 1, hi = deck.length;
      const pos = lo + Math.floor(Math.random() * Math.max(hi - lo + 1, 1));
      deck.splice(Math.min(pos, deck.length), 0, removed);
    }
    if (current >= deck.length && deck.length > 0) current = 0;
    saveSession();
    if (deck.length === 0) { showComplete(); busy = false; return; }
    renderCard();
    card.classList.add('pop-in');
    setTimeout(() => { card.classList.remove('pop-in'); busy = false; }, 220);
  }, 280);
}

document.getElementById('btn-got').addEventListener('click',   () => advance('right'));
document.getElementById('btn-again').addEventListener('click', () => advance('left'));

// ── Swipe ──
let touchX0 = 0, touchY0 = 0, dragging = false;
const cardEl = document.getElementById('card');
const labelGot = document.getElementById('label-got');
const labelAgain = document.getElementById('label-again');

cardEl.addEventListener('touchstart', e => {
  if (busy) return;
  touchX0 = e.touches[0].clientX; touchY0 = e.touches[0].clientY;
  dragging = false; cardEl.classList.add('no-transition');
}, { passive: true });

cardEl.addEventListener('touchmove', e => {
  if (busy) return;
  const dx = e.touches[0].clientX - touchX0;
  const dy = e.touches[0].clientY - touchY0;
  if (!dragging && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) dragging = true;
  if (!dragging) return;
  cardEl.style.transform = 'translateX(' + dx + 'px) rotate(' + (dx * 0.06) + 'deg)';
  const t = Math.min(Math.abs(dx) / 90, 1);
  labelGot.style.opacity   = dx >  15 ? t : 0;
  labelAgain.style.opacity = dx < -15 ? t : 0;
}, { passive: true });

cardEl.addEventListener('touchend', e => {
  cardEl.classList.remove('no-transition');
  labelGot.style.opacity = labelAgain.style.opacity = 0;
  if (!dragging) { cardEl.style.transform = ''; return; }
  dragging = false;
  const dx = e.changedTouches[0].clientX - touchX0;
  e.preventDefault();
  cardEl.style.transform = '';
  if      (dx >  75) advance('right');
  else if (dx < -75) advance('left');
}, { passive: false });

// ── Menu ──
const overlay = document.getElementById('overlay');
document.getElementById('menu-btn').addEventListener('click', () => overlay.classList.remove('hidden'));
document.getElementById('menu-cancel').addEventListener('click', () => overlay.classList.add('hidden'));
overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.add('hidden'); });
document.getElementById('menu-shuffle').addEventListener('click', () => {
  overlay.classList.add('hidden');
  localStorage.removeItem('pc_session_' + activeDeckId);
  startFresh();
});
document.getElementById('home-btn').addEventListener('click', () => showScreen('home'));

// ── Complete ──
function showComplete() {
  document.getElementById('stat-total').textContent = phrases.length;
  document.getElementById('stat-got').textContent   = learned.length;
  document.getElementById('complete-desc').textContent =
    'You reviewed all ' + phrases.length + ' phrases.';
  showScreen('complete');
}
document.getElementById('btn-restart').addEventListener('click', () => {
  localStorage.removeItem('pc_session_' + activeDeckId);
  startFresh();
});
document.getElementById('btn-back-home').addEventListener('click', () => showScreen('home'));

// ── Utils ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function showScreen(name) {
  ['home','study','complete'].forEach(s => {
    document.getElementById(s+'-screen').classList.toggle('hidden', s !== name);
  });
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
